<script>
var MARVEL = {
  ferro: { nome:"Homem de Ferro", emoji:"🦾", l:[
    {t:"Como Tony Virou o Homem de Ferro",b:"<p>Tony Stark tinha dez anos quando construiu seu primeiro robozinho. Não era um robozinho de brinquedo — era de verdade, feito com peças que ele tinha encontrado na garagem do pai. O robozinho andava, piscava uma luzinha azul e fazia um barulhinho: <b>bip bip bip.</b></p><p>O pai de Tony olhou para aquilo e disse:<br>— Filho, você vai mudar o mundo.<br>Tony respondeu, com a orelha cheia de óleo de máquina:<br>— Eu sei. Mas primeiro preciso consertar a roda direita dele que fica puxando pra esquerda.</p><p>Quando cresceu, Tony criou coisas incríveis. Carros. Aviões. Sistemas de energia. Mas um dia, numa situação muito perigosa longe de casa, ele ficou sozinho, sem nenhum equipamento. Só tinha sucata ao redor. E o que Tony fez? O que ele sempre fazia: inventou. Com as próprias mãos, no escuro, peça por peça, ele construiu uma armadura. Vermelha e dourada. Com reatores no peito que brilhavam azul. E nela... ele voou.</p><p>Quando pousou em segurança e tirou o capacete, Tony olhou para a armadura e percebeu: aquilo não era só uma máquina. Era uma responsabilidade. Se ele conseguia fazer algo assim, tinha o dever de usar para proteger as pessoas. Naquela noite, deitado de costas olhando para o teto, Tony sorriu e pensou: <b>A partir de agora, as coisas vão mudar.</b> E dormiu com o brilho azul da armadura iluminando o quarto, como uma estrelinha que não se apaga. 💛</p>"},
    {t:"Tony e o Festival das Lanternas",b:"<p>Era uma vez o Homem de Ferro e o Homem-Aranha numa noite muito especial. A cidade inteira estava se preparando para o Festival das Luzes, com lanternas coloridas, música calma e balões brilhando no céu escuro.</p><p>Peter estava animadíssimo:<br>— Senhor Stark, dizem que dá pra ver as lanternas do outro lado da cidade inteira!<br>Tony respondeu mexendo numa máquina:<br>— E este ano vai ser ainda melhor.<br>Peter olhou desconfiado:<br>— Quando o senhor fala isso... normalmente significa problema.<br>Tony sorriu:<br>— Dessa vez talvez só um probleminha pequeno.</p><p>Na praça principal, milhares de pessoas observavam as lanternas sendo preparadas. Tinha lanternas em forma de estrela, de lua, de peixinho, e até uma em formato de aranha que Peter fingiu não achar incrível. Mas bem na hora do festival começar... <b>BUUUP!</b> Todas as luzes apagaram. A música parou. As crianças fizeram: <em>Ooooh...</em></p><p>Tony olhou pro céu:<br>— O gerador principal falhou.<br>Peter já colocou a máscara:<br>— Então vamos salvar o festival.<br><b>SWISH! PSHHHT!</b> O Homem-Aranha saiu balançando entre os postes. O Homem de Ferro voava acima iluminando tudo com a armadura. As crianças apontavam: <em>Olha! O Homem de Ferro!</em></p><p>Peter encontrou os fios soltos, mas estavam altos demais. Tony teve uma ideia:<br>— Peter, sobe nas minhas costas.<br>— Isso nunca termina de forma normal, né?<br>Em segundos, Tony voava pelo céu enquanto Peter consertava os fios nas suas costas. <b>ZZZZT!</b> A praça inteira voltou a brilhar! Azuis. Amarelas. Vermelhas. Douradas. Milhares de lanternas subiram lentamente para o céu escuro como vagalumes gigantes.</p><p>Peter e Tony pousaram no alto de um prédio pra assistir. Peter falou baixinho:<br>— Acho que essa foi uma das noites mais bonitas da minha vida.<br>Tony respondeu:<br>— Algumas coisas ficam ainda melhores quando a gente compartilha.<br>Os dois ficaram em silêncio olhando as luzes dançando no céu. E agora é hora de descansar tranquilo, como uma lanterninha brilhando bem fraquinho antes de dormir. 😴</p>"},
    {t:"Tony e a Noite que a Armadura Dormiu",b:"<p>Era meia-noite quando Tony Stark finalmente desligou os últimos hologramas do laboratório. O Dum-E, seu robozinho fiel, estava empilhando caixas de parafuso no canto e derrubou tudo com um barulhão: <b>CATRAPIMBUM!</b></p><p>Tony nem virou:<br>— Dum-E...<br>O robô inclinou o braço para o lado como se dissesse: <em>fui sem querer.</em><br>— Você sempre é sem querer.</p><p>Tony foi até a armadura, que ficava parada no suporte iluminada pela luz azul do reator. E percebeu algo estranho: a armadura estava piscando num ritmo muito lento. Não era o piscar normal de carregamento. Era devagar demais. Quase como uma respiração.<br>— Você está... sonhando? — Tony perguntou baixinho.</p><p>Ele ficou olhando por um momento. E imaginou: o que uma armadura sonharia? Talvez voar por entre nuvens brancas sem nenhuma missão urgente. Só o prazer de cortar o ar, o sol batendo no metal dourado, o mundo lá embaixo pequenininho e bonito.</p><p>Tony sorriu, foi até a cama devagar para não atrapalhar o sonho dela, se deitou e fechou os olhos. <b>Bzzz... bzzz... bzzz...</b> O barulhinho manso do carregamento preencheu o quarto. E Tony Stark, o inventor mais genial do mundo, adormeceu junto com sua armadura, os dois descansando depois de mais um dia incrível. 💤</p>"},
    {t:"Tony, a Tempestade e o Cobertor Azul",b:"<p>Uma tempestade enorme estava chegando na cidade. <b>BUUUM!</b> O trovão ecoou longe. <b>CRAK!</b> Um raio iluminou o céu todo de branco por um segundo. As janelas do laboratório de Tony tremeram.</p><p>Pepper entrou preocupada:<br>— Tony, o sistema de energia da cidade pode falhar. Milhares de casas podem ficar no escuro.<br>Tony já estava de pé:<br>— Já sei. Cinco minutos.<br>— Você disse cinco minutos ontem e levou três horas.<br>— Dessa vez são cinco minutos de verdade.</p><p>A armadura se montou peça por peça ao redor do Tony com aquele barulhinho mecânico que ele adorava: <b>clique, clique, clique, TCHAC!</b> E ele saiu voando direto para a tempestade. Lá em cima, a chuva batia no metal vermelho e dourado. Os raios faiscavam ao redor. Tony voou até a subestação de energia e, com muito cuidado, redirecionou os circuitos para proteger a cidade.</p><p><b>ZZZZT!</b> As luzes da cidade que tinham começado a piscar ficaram firmes de novo. Lá de cima, Tony viu mil janelas iluminadas espalhadas pela cidade como estrelinhas douradas na escuridão.</p><p>Quando pousou e tirou a armadura, Pepper estava com uma xícara de chá quente esperando.<br>— Cinco minutos e vinte segundos — ela disse.<br>— Progresso — Tony respondeu com um sorriso.<br>Ele tomou o chá, foi para a cama, puxou o cobertor azul até o queixo, e com o barulhinho da chuva batendo suave na janela, adormeceu tranquilo. 🌧️</p>"},
    {t:"Tony e a Estrela Cadente",b:"<p>Naquela noite a Pepper foi até a varanda e encontrou Tony parado olhando pro céu. Ela conhecia aquela postura: braços cruzados, cabeça levemente inclinada. Era a postura de Tony quando estava pensando em algo importante.</p><p>Ela foi até o lado dele:<br>— O que foi?<br>— Tô contando estrelas.<br>— Você nunca contou estrelas na vida.<br>— Comecei hoje.</p><p>Pepper olhou para o céu. Era uma noite limpa, sem nuvens, e as estrelas estavam todas lá, cada uma no lugar certo. De repente, uma luz riscou o céu do lado esquerdo pro lado direito, deixando um rastro prateado que sumiu em dois segundos.</p><p>— Uma estrela cadente! — Pepper disse animada.<br>Tony fechou os olhos rapidinho.<br>— Fiz um pedido.<br>— Que pedido?<br>— Se eu contar deixa de funcionar.<br>— Tony...<br>— Pedi que amanhã seja tão bom quanto hoje. — Ele abriu os olhos e olhou pra ela. — É um pedido simples, mas é o que eu quero.</p><p>Pepper ficou quieta por um momento. Depois pegou a mão dele.<br>Eles ficaram ali até o céu ficar mais escuro e as estrelas ficarem mais brilhantes. Depois foram pra cama, e Tony adormeceu com aquela leveza gostosa de quem não precisa mais de nada do que já tem. 🌠</p>"}
  ]},
  homem_aranha: { nome:"Homem Aranha", emoji:"🕷️", l:[
    {t:"Como Peter Parker Virou o Homem-Aranha",b:"<p>Peter Parker era o tipo de menino que lia livros de ciência por diversão e sabia o nome de cada tipo de aranha que existia. Na escola, os colegas às vezes zoavam ele por ser tão estudioso. Mas Peter não ligava muito. Ele sabia que aprender era sempre o caminho certo.</p><p>Numa visita escolar a um laboratório científico, enquanto Peter olhava maravilhado para um experimento com aranhas radioativas, uma delas escapou do vidro e picou o pulso dele. <b>Au!</b> Parecia uma picada qualquer. Mas no dia seguinte Peter acordou e... as mãos grudavam na parede. Reflexos de raio. E os pulsos... soltavam teias.</p><p>Peter passou dias no quarto testando tudo sozinho:<br>— Consigo grudar no teto. Legal. Consigo soltar teia. Muito legal. Consigo sentir o perigo antes de ver. <em>Isso</em> é incrível.</p><p>Mas então aconteceu algo triste que ensinou a Peter a lição mais importante da vida: ter poder e não usar para ajudar quem precisa não é opção. Aquela noite, Peter deitou na cama com o coração apertado e tomou uma decisão que mudou tudo: <b>A partir de agora, sempre que puder ajudar, vou ajudar.</b> E assim nasceu o Homem-Aranha. Não de um acidente — mas de uma escolha. 🕷️</p>"},
    {t:"Peter e o Gatinho da Escada",b:"<p>Era quase meia-noite quando Peter Parker estava voando de teia entre os prédios, já pensando em ir pra casa, quando ouviu um som fraco vindo lá de baixo: <b>Miau... miau...</b></p><p>Peter parou. Olhou. No meio de uma escadaria molhada pela chuva, um gatinho laranjinha estava encolhido num degrau, tremendo de frio. Do lado estava um menininho de uns quatro anos em pijama, ajoelhado na chuva, tentando alcançar o gato, enquanto uma mulher — provavelmente a mãe — tentava chamar o menino de volta.</p><p><b>SWISH!</b> Peter desceu em segundos, pousou suave do lado do menino.<br>— Oi. Posso ajudar?<br>O menino olhou pra cima com os olhos arregalados:<br>— O gatinho tá com medo da chuva!<br>— Eu sei. Mas eu acho que sei falar aranha-gato. Deixa eu tentar.</p><p>Peter agachou, ficou no nível do gatinho e esperou. Bem devagarzinho, o gato farejou a mão da luva dele e deu um passo. Depois mais um. Até que subiu no colo do Peter. <b>Ronron ronron.</b></p><p>Peter entregou o gato pro menino que abraçou o bichinho com toda a força dos braços pequeninhos. A mãe suspirou aliviada. E o menino olhou pro Peter e disse:<br>— Obrigado, Homem-Aranha.<br>Peter sentiu aquilo quentinho no peito o caminho todo pra casa. Deitou na cama, ainda com o cheirinho de chuva no traje, e dormiu do jeito mais tranquilo do mundo. 🐱</p>"},
    {t:"Peter e o Caderninho das Três Coisas",b:"<p>Peter Parker tinha um caderninho azul que a Tia May tinha dado de presente. Na capa estava escrito: <em>Coisas boas de hoje.</em> E toda noite, antes de dormir, Peter abria o caderninho e escrevia exatamente três coisas boas que tinham acontecido naquele dia.</p><p>Num dia especialmente difícil — tinha chovido, a mochila molhou, a prova foi mais difícil que esperava — Peter abriu o caderninho e ficou olhando para a página em branco. Pensou. Pensou mais um pouco. E escreveu:</p><p><em>1. A Tia May fez macarrão com almôndega sem eu pedir.<br>2. Vi um passarinho azul que nunca tinha visto antes no parque.<br>3. Ajudei uma velhinha a encontrar o ônibus certo e ela disse que eu era um menino muito bom.</em></p><p>Peter releu as três coisas. Eram simples. Mas eram reais. E de repente o dia que parecia horrível tinha três momentos bonitos que ele quase não tinha prestado atenção.</p><p>Ele fechou o caderninho com cuidado, apagou a luz, deitou na cama macia. A Tia May passava no corredor e bateu suave na porta:<br>— Boa noite, meu amor.<br>— Boa noite, Tia May.<br>E Peter dormiu com as três coisas boas brilhando quietinhas no escuro da memória. 📓</p>"},
    {t:"Peter e a Carta no Travesseiro",b:"<p>A Tia May tinha um ritual que Peter adorava, mesmo fingindo que não ligava: toda noite ela deixava um bilhetinho dobrado no travesseiro dele. Sempre antes de ele chegar em casa. Sempre escrito à mão, com a letra dela que tinha um jeito levemente inclinado pra esquerda.</p><p>Naquela noite Peter chegou tarde, já com o traje do Homem-Aranha dobrado debaixo do braço, e viu o bilhetinho como sempre. Desdobrou devagar:</p><p><em>Boa noite, meu amor. Seja lá o que você fez hoje, tenho certeza que foi algo bom. Você tem o coração mais bonito que já vi — e isso vale mais do que qualquer superpoder. Dorme bem. Amanhã é mais um dia para ser incrível. Com amor, Tia May.</em></p><p>Peter leu três vezes. Na primeira, sorriu. Na segunda, sentiu o nariz picar um pouquinho. Na terceira, dobrou o bilhete com muito cuidado e guardou embaixo do travesseiro, junto com todos os outros que ele nunca jogava fora.</p><p>Lá embaixo tinha uma pilha de bilhetinhos. Toda noite. Toda noite a Tia May tinha pensado nele. Peter colocou a mão em cima do travesseiro, sentiu o relevo suave dos papéis dobrados, e fechou os olhos com aquela segurança boa de quem sabe que é amado. 💌</p>"},
    {t:"Peter e a Noite do Festival de Fogos",b:"<p>Era véspera do aniversário da cidade, e à noite ia ter fogos de artifício. Peter estava tão animado que mal conseguia ficar parado no jantar.</p><p>— Senta direito — disse a Tia May.<br>— Tô sentado.<br>— Você está quicando na cadeira.<br>— Isso é sentar.</p><p>À noite, Peter foi pro terraço do prédio. Lá de cima via a cidade inteira. E quando os fogos começaram... <b>PUM! PUM! CRAAAC!</b> Flores de luz azul, vermelha, dourada, verde explodindo no céu escuro uma depois da outra. O reflexo deles piscava nos janelões dos prédios. As crianças lá embaixo na rua gritavam de alegria a cada um.</p><p>Peter ficou ali sozinho no terraço, sentado na beira, olhando tudo com os olhos bem abertos. Havia algo naquilo que ele achava impossível de descrever: a cidade inteira parando ao mesmo tempo para olhar pra cima. Todas as pessoas diferentes, de prédios diferentes, olhando para a mesma luz.</p><p><b>BUUUM!</b> O último fogo foi o maior de todos. Uma explosão de ouro e branco que iluminou tudo por uns três segundos e depois sumiu devagar, deixando só a fumaça branca subindo calma no céu.</p><p>Peter ficou olhando o céu vazio por mais um tempo. Depois desceu, foi pra cama, e dormiu com aquelas cores ainda piscando na memória. 🎆</p>"}
  ]},
  thor: { nome:"Thor", emoji:"⚡", l:[
    {t:"Como Thor Aprendeu o que é Ser Herói",b:"<p>Thor cresceu em Asgard achando que era o melhor em tudo. E tecnicamente... era. Mais forte. Mais rápido. O único capaz de segurar o Mjolnir. Mas havia um problema que o pai Odin via claramente: Thor achava que força era tudo. E força sem humildade não é heroísmo — é arrogância.</p><p>— Você vai para a Terra — Odin disse um dia, com a voz que não aceitava argumentos.<br>— Pai, eu sou o príncipe de—<br>— Você vai para a Terra. Sem poderes. Sem armadura. Sem o Mjolnir. E só vai voltar quando entender o que realmente importa.</p><p>Na Terra, Thor era um homem comum. Caía. Sentia fome. Não entendia as máquinas estranhas. E precisava de ajuda para as coisas mais simples. E as pessoas... ajudavam. Sem saber quem ele era. Sem pedir nada em troca. Uma cientista chamada Jane lhe deu comida. Um velhinho lhe emprestou roupas. Uma criança lhe ensinou a usar uma torneira.</p><p>Certo dia, Thor viu alguém em perigo. Sem poderes, sem armadura, ele foi assim mesmo. Saiu na frente. Porque era a coisa certa a fazer.</p><p>Naquela noite, olhando pro céu estrelado da Terra, Thor entendeu: <b>Coragem não precisa de poderes. Vem do coração.</b> E quando o Mjolnir veio voando até a mão dele de volta, Thor o segurou com mais cuidado do que nunca. Porque agora sabia o que aquilo significava. ⚡</p>"},
    {t:"Thor e a Chuva que Ele Pediu",b:"<p>Era verão na cidade e fazia um calor imenso. As crianças estavam derretendo no parque, as flores estavam murchas e até os cachorros tinham desistido de brincar.</p><p>Thor estava sentado num banco observando tudo aquilo quando uma menininha de tranças foi até ele:<br>— Você é o Thor, né? O do trovão?<br>— Sou eu.<br>— Então você pode fazer chover?<br>Thor olhou pro céu seco. Depois olhou pra menininha.<br>— Posso. Mas a chuva vai molhar você também.<br>A menina abriu o maior sorriso do mundo:<br>— ÓTIMO.</p><p>Thor pegou o Mjolnir, ficou de pé bem no meio do parque, fechou os olhos por um segundo e... <b>BUUUUM!</b> Uma nuvem enorme e escura apareceu do nada. <b>CRAK!</b> Um raio cortou o céu. E então veio a chuva. Não uma garoa tímida — uma chuva de verdade, generosa, que molhava tudo de uma vez.</p><p>As crianças gritaram de alegria e saíram correndo na chuva. Os cachorros também. Até os adultos levantaram das cadeiras e andaram na chuva com as mãos abertas pro céu.</p><p>Thor ficou no meio do parque, completamente encharcado, com as crianças dançando ao redor dele. A menininha das tranças pulou numa poça do lado dele: <b>SPLASH!</b> e respingou água em todo mundo. Thor gargalhou.<br>Naquela noite, chegando em casa encharcado e feliz, ele tirou a capa, deitou na cama e dormiu com o barulho da chuva ainda cantando lá fora. 🌧️</p>"},
    {t:"Thor e o Martelo que Descansava",b:"<p>Era tarde da noite e Thor estava preparando a cama quando olhou pro Mjolnir apoiado no canto do quarto. Havia algo diferente. O martelo estava... silencioso. Muito silencioso. Não que ele falasse normalmente, claro. Mas Thor achava que dava pra sentir a energia dele, aquela vibração constante, aquela disposição pra sair voando a qualquer momento.</p><p>Naquela noite: nada. O Mjolnir estava parado, quieto, pesado do jeito de coisa que não vai a lugar nenhum.</p><p>Thor se aproximou e sussurrou:<br>— Cansado também, hein?<br>Nada.<br>— Hoje foi muito trabalho pra nós dois. Mas valeu, não valeu?<br>Silêncio total. Mas Thor imaginou que, se o Mjolnir pudesse falar, diria: <em>Valeu sim. Pode dormir.</em></p><p>Thor se deitou na cama enorme do palácio de Asgard. O teto era alto, as paredes brilhavam levemente com cristais, e lá fora as estrelas de Asgard piscavam numa frequência que não existia na Terra. Thor cruzou os braços no peito e fechou os olhos.</p><p><b>Bzzz...</b> Uma vibração mansa. O Mjolnir estava recarregando. Como uma bateria. Como uma armadura. Como tudo que havia trabalhado bastante e merecia descanso. Thor sorriu no escuro. E dormiu. 🔨</p>"},
    {t:"Thor e as Estrelas do Papai Odin",b:"<p>Quando Thor tinha uns seis anos, o pai Odin tinha um ritual toda noite: levava o filho até a varanda mais alta do palácio de Asgard e apontava as constelações uma por uma.</p><p>— Aquela ali — Odin dizia com a voz grave e calma — é a Constelação do Guerreiro Corajoso. Brilha mais nas noites de inverno.<br>— E aquela? — Thor apontava.<br>— Essa é a Estrela do Caminho. Quando você se perder — em qualquer sentido — olhe pra ela. Ela sempre aponta o norte.<br>— E o norte é onde fica casa?<br>Odin sorriu:<br>— O norte é onde fica o que importa.</p><p>Thor nunca esqueceu aquelas noites. E mesmo depois de adulto, depois de mil batalhas e mil jornadas, antes de dormir ele sempre ia até uma janela olhar as estrelas por um momento.</p><p>Naquela noite, no palácio sozinho, Thor foi até a varanda. Encontrou a Constelação do Guerreiro Corajoso brilhando forte. Encontrou a Estrela do Caminho, quietinha e certa no lugar de sempre. E achou uma nova estrela dourada que ele nunca tinha reparado antes, bem no centro do céu.</p><p>— Boa noite, pai — ele disse baixinho.<br>Depois entrou, se deitou, e dormiu com o céu de Asgard brilhando atrás das pálpebras. ✨</p>"},
    {t:"Thor e o Dia em que Ensinou o Mjolnir a Esperar",b:"<p>Tinha um problema que Thor enfrentava desde sempre: o Mjolnir era impaciente. Qualquer barulho alto, qualquer movimento súbito, e o martelo começava a vibrar nas mãos dele como se dissesse: <em>Vamos? Vamos? É hora? Vamos!</em></p><p>Certa tarde, Thor estava tentando tomar um café tranquilo com os Vingadores quando um balão de criança estourou no parque ao lado.<br><b>PUM!</b><br>O Mjolnir saiu voando da mesa.<br>— Não era nada! — Thor correu atrás.<br>Natasha olhou pro buraco que o martelo tinha feito na parede:<br>— Você precisa ensinar esse negócio a ter calma.<br>— Estou tentando há trezentos anos.</p><p>Naquela noite Thor teve uma ideia. Pegou o Mjolnir, foi até o jardim, se sentou na grama e ficou em silêncio. Só silêncio. Respirando fundo. Um pássaro cantou lá longe. O vento mexeu nas folhas. Nada explodiu. O Mjolnir foi vibrando menos, menos, menos... até ficar completamente quieto no colo de Thor.</p><p>— Viu? — Thor sussurrou. — Nem tudo que faz barulho é batalha. Algumas coisas são só... a noite chegando.<br>Lá dentro, os Vingadores espiavam pela janela.<br>Steve: — Ele está conversando com o martelo.<br>Tony: — Deixa. Tá funcionando.</p><p>Thor ficou no jardim até as estrelas aparecerem. Depois foi pra cama, colocou o Mjolnir do lado, e os dois dormiram em paz. ⚡</p>"}
  ]},
  hulk: { nome:"Hulk", emoji:"💚", l:[
    {t:"Como Bruce Aprendeu a Conviver com o Hulk",b:"<p>Bruce Banner era o tipo de cientista que chegava cedo no laboratório e saía tarde. Usava óculos. Falava baixo. E entendia de física quântica melhor do que qualquer pessoa do planeta. Certo dia, um experimento com energia gama deu muito errado, e Bruce ficou exposto a uma quantidade enorme dessa energia.</p><p>Na primeira vez que se transformou no Hulk foi assustador. <b>CRAAAAAC!</b> As roupas rasgaram. O teto arranhado. O Bruce sumiu e apareceu uma criatura enorme, verde, com punhos do tamanho de pedras.</p><p>Bruce ficou semanas tentando entender. E descobriu: o Hulk aparecia quando ele ficava com raiva ou com medo. E o Hulk não era um monstro — era a versão dele que não sabia pedir ajuda de outro jeito. Era força. Era proteção. Era tudo que Bruce guardava dentro sem conseguir mostrar.</p><p>Com o tempo, Bruce aprendeu algo importante: não precisava lutar contra o Hulk. Precisava conversar. Ser gentil com as duas partes de si mesmo.<br>— A gente é a mesma pessoa — ele disse uma vez pra frente do espelho, enquanto os olhos dele brilhavam levemente verdes.<br>O Hulk lá dentro respondeu, do seu jeito: <em>Eu sei.</em></p><p>E naquela noite, pela primeira vez, Bruce dormiu tranquilo, sem medo do que poderia acontecer de manhã. 💚</p>"},
    {t:"O Hulk e a Florzinha no Parque",b:"<p>Ninguém esperava ver o Hulk num parque público num sábado de manhã. Mas lá estava ele, enorme e verde, sentado num banco que rangeu muito quando ele se sentou, tomando um suco de laranja com um canudinho que parecia um fio de cabelo nas mãos dele.</p><p>As crianças se aproximaram aos poucos. Primeiro de longe. Depois um pouco mais perto. Até que uma menina de uns quatro anos chegou do lado, olhou pra cima pro Hulk, e perguntou sem cerimônia:<br>— Por que você é verde?<br>— Acidente de laboratório.<br>— Doeu?<br>— Um pouquinho.<br>— Minha mãe bota curativo quando dói.<br>— É... ela não ia ter curativo suficiente.</p><p>A menina pensou por um segundo e depois ofereceu pra ele uma florzinha amarela que tinha colhido da grama:<br>— Pode ficar. Florzinha deixa tudo melhor.<br>O Hulk olhou pra florzinha pequenininha na mão enorme dele. Ficou quieto um momento. Depois disse, com a voz mais baixa que conseguia:<br>— Obrigado.</p><p>Naquela noite, de volta ao laboratório, Bruce Banner colocou a florzinha num copinho com água na janela. Ela ficou lá por dias. E toda vez que Bruce a via, lembrava que gentileza pode vir de qualquer tamanho. Deitou na cama, olhou pro teto, e dormiu sorrindo. 🌼</p>"},
    {t:"Bruce e o Ritual do Chá",b:"<p>Cada Vingador tinha seu jeito de desacelerar no fim do dia. Tony mexia nos projetos até cair dormindo na cadeira. Steve desenhava. Natasha meditava. E Bruce Banner fazia chá.</p><p>Era um ritual de dez minutos que ele levava muito a sério. Primeiro escolhia o chá: camomila se o dia tinha sido agitado, hortelã se estava com dor de cabeça, erva-doce quando simplesmente queria algo gostoso. Colocava a água pra ferver. Esperava exatamente o tempo certo — não demais, não de menos. Despejava devagar. Esperava esfriar um pouquinho.</p><p>Naquela noite Tony tinha entrado na cozinha e olhado pro Bruce com a caneca nas mãos:<br>— Você faz esse ritual toda noite?<br>— Toda noite.<br>— Não é mais fácil só... sei lá, tomar água?<br>— Não é sobre a sede, Tony. É sobre parar.<br>Tony ficou pensando por um segundo:<br>— Posso ter um também?<br>— Você podia ter pedido antes.<br>— Não sabia que precisava até agora.</p><p>Os dois ficaram sentados na cozinha quieta, tomando chá sem falar nada. Lá fora a cidade fazia seu barulho de sempre. Mas ali dentro estava quieto e quentinho.</p><p>Bruce foi pra cama, dormiu fundo, e sonhou com absolutamente nada de estressante. 🍵</p>"},
    {t:"O Hulk e o Céu de Estrelas",b:"<p>Depois de uma missão numa floresta distante, o Hulk ficou parado sozinho enquanto os outros Vingadores organizavam o equipamento. E olhou pro céu.</p><p>Era o céu mais limpo que ele já tinha visto. Sem poluição, sem prédios, sem luzes de cidade. Só escuridão total e estrelas — tantas que pareciam purpurina espalhada num veludo preto.</p><p>O Hulk deitou na grama devagar. <b>CRUM.</b> O chão sacudiu um pouco. Ele cruzou os braços enormes atrás da cabeça e ficou olhando pra cima, completamente imóvel, o que era bem incomum pro Hulk.</p><p>Steve chegou do lado e também olhou pro céu:<br>— Bonito, né?<br>O Hulk não respondeu. Mas assentiu levinho com a cabeça.<br>Natasha chegou depois:<br>— Hulk meditando. Ninguém vai acreditar.<br>Tony chegou por último, viu a cena, e sem dizer nada se deitou também. Depois Steve. Depois Natasha. Cinco Vingadores deitados na grama olhando pras estrelas em silêncio.</p><p>Ninguém falou nada por uns cinco minutos. Era o tipo de silêncio que não precisa ser quebrado.</p><p>Mais tarde, já de volta, Bruce dormiu naquela noite com a imagem do céu ainda nos olhos. E o Hulk, lá no fundo, estava quieto e contente. 🌟</p>"},
    {t:"Bruce e os Dez Fôlegos",b:"<p>Bruce Banner tinha um segredo que funcionava melhor do que qualquer ciência: antes de dormir, ele respirava fundo exatamente dez vezes. Não era inventado. Não era esotérico. Era neurociência pura: respiração lenta ativa o sistema nervoso parassimpático, que acalma o corpo e prepara pra dormir.</p><p>Ele tentou ensinar isso pro Tony uma vez.<br>— Respira fundo dez vezes antes de dormir.<br>— Por quê?<br>— Porque você dorme no laboratório toda semana e acorda com torcicolo.<br>— Isso é porque minha cadeira é confortável demais.<br>— Tony. Dez fôlegos.<br>— Tá bem.</p><p>Naquela noite Bruce foi pro quarto, deitou, e começou. <em>Um...</em> Os ombros foram descendo. <em>Dois...</em> A mandíbula foi soltando. <em>Três...</em> a mente foi ficando quieta como lago sem vento. Seis, sete... o corpo foi ficando pesado do jeito gostoso. Oito... Nove...</p><p>No décimo Bruce já estava quase dormindo. Lá no fundo, o Hulk bocejou — sim, o Hulk bocejava — e ficou quieto também.</p><p>E Bruce Banner, o homem mais complicado dos Vingadores, dormiu como um bebê. 💚</p>"}
  ]},
  capitao: { nome:"Capitao America", emoji:"🛡️", l:[
    {t:"Como Steve Rogers Virou o Capitao America",b:"<p>Steve Rogers era o menino mais determinado de Nova York. E também um dos mais pequenos, magros e com mais problemas de saúde da escola. Asma. Visão ruim. Ficava doente fácil. Os médicos tinham uma lista de coisas que ele não devia fazer. Steve tinha outra lista: de coisas que ia fazer assim mesmo.</p><p>Quando a guerra começou e todos os homens se alistaram, Steve tentou entrar no exército. Foi reprovado cinco vezes. Cinco. Cada vez com um médico diferente olhando a ficha dele e dizendo: <em>Senhor, você não está em condições.</em> E Steve voltava, esperava, e tentava de novo.</p><p>Foi a quinta tentativa que o Dr. Erskine viu. Não o corpo de Steve. O que ele fazia quando levava um não: voltava. Sempre voltava. E o Dr. disse algo que Steve nunca esqueceu:<br>— O soro vai amplificar o que você já é por dentro. Num homem bom, cria um herói. Por isso eu te escolhi: não por sua força. Pelo seu coração.</p><p>Naquela noite, depois do procedimento, Steve olhou as próprias mãos — maiores, mais fortes. Mas o que ele pensou não foi sobre força. Foi: <b>Agora posso proteger quem não consegue se proteger.</b> E dormiu com aquela responsabilidade no peito, sabendo que estava pronto. 🛡️</p>"},
    {t:"Steve e a Noite Depois da Missao",b:"<p>Steve Rogers chegou em casa às onze da noite depois de um dia que tinha começado às cinco da manhã. Tinha ajudado a desbloquear uma estrada interditada, resgatado dois civis num incêndio, e no caminho de volta ainda parou pra ajudar uma senhora a carregar as compras até o apartamento dela no quinto andar, porque o elevador estava quebrado.</p><p>Na porta do apartamento, ele pendurou o escudo na parede com cuidado. Olhou pra ele por um momento:<br>— Bom trabalho hoje.<br>O escudo brilhou levinho com o reflexo da janela. Steve achou que era quase uma resposta.</p><p>Foi ao banheiro, escovou os dentes — <em>super-heróis escovam os dentes, Steve sempre dizia isso</em> — lavou o rosto com água fria, e foi pra cama. Deitou de costas, cruzou os braços no peito e ficou olhando pro teto por um momento deixando o dia passar na memória.</p><p>A senhora do quinto andar tinha sorrido tanto quando ele ajudou as sacolas. Os dois civis no incêndio estavam bem. A estrada estava aberta de novo.</p><p>— Vale a pena — ele murmurou pra ninguém, ou talvez pro escudo na parede que podia ouvir. E fechou os olhos. E dormiu. 🌿</p>"},
    {t:"Steve e a Musica do Radio Velho",b:"<p>Steve Rogers tinha um rádio velho de dial e antena que tinha comprado numa loja de antiguidades assim que chegou no século XXI. Tony tinha oferecido um sistema de som inteligente com cinquenta mil músicas. Steve tinha declinado educadamente.</p><p>— Por quê? — Tony perguntou genuinamente confuso.<br>— Porque o rádio tem surpresa. Você não sabe o que vai tocar.<br>— Isso não é um bug. Você pode escolher.<br>— Escolher não é sempre melhor.</p><p>Naquela noite Steve ligou o rádio, foi deitando devagar na cama enquanto o dial aquecia. Pegou uma estação que tocava músicas de orquestra, suave, sem pressa. Notas que preenchiam o quarto de um jeito gentil.</p><p>Steve ficou de olhos fechados ouvindo. Pensou no Bucky. No Sam. Em todos que caminhavam com ele. Sentiu o coração quentinho de gratidão por ter pessoas assim.</p><p>A música foi tocando baixinho por mais uns vinte minutos. Steve estava dormindo faz tempo, a respiração lenta e profunda, o rosto relaxado, o escudo na parede brilhando suave. E o rádio tocou pra ele até a estação mudar. 🎵</p>"},
    {t:"Steve e o Sorvete de Baunilha no Parque",b:"<p>Num sábado raro sem missão, Steve Rogers saiu de casa de jeans e camiseta simples. Sem escudo. Sem uniforme. Sem nada que dissesse Capitão América. Só Steve.</p><p>Foi ao parque. Comprou um sorvete de baunilha — sempre baunilha, a mesma escolha desde os seis anos de idade. Se sentou num banco perto do lago.</p><p>Uma criança de uns quatro anos parou do lado dele e olhou pro sorvete.<br>— Posso provar?<br>— Você pediu permissão pra seus pais?<br>A criança pensou por um segundo e saiu correndo. Voltou trinta segundos depois:<br>— Minha mãe disse que pode!<br>Steve deu um pouquinho. A criança provou, fez uma careta de satisfação exagerada, e saiu correndo de novo.</p><p>Steve ficou no banco até o sorvete acabar, até o sol ir baixando. Viu um cachorro que não conseguia parar de correr atrás da própria sombra. Ouviu uma briga entre dois pombos por um pedaço de pão. Viu uma criança dormir no colo da mãe sem avisar.</p><p>De noite, deitado na cama, Steve pensou: os melhores momentos não são os de batalha. São os de baunilha num banco de parque. E dormiu com o gosto ainda na memória. 🍦</p>"},
    {t:"Steve e a Promessa de Toda Noite",b:"<p>Steve Rogers tinha um ritual que nunca quebrava, não importava o cansaço, não importava o horário: antes de dormir, ia até a janela, olhava pro céu por exatamente um minuto, e fazia uma promessa silenciosa para o dia seguinte.</p><p>Sempre a mesma. Palavra por palavra.<br><em>Serei corajoso diante do que der medo. Ajudarei quem precisar, mesmo cansado. Serei honesto mesmo quando for difícil. Não desistirei do que é certo, mesmo quando o certo for o caminho mais duro.</em></p><p>Naquela noite a lua estava enorme e laranja no horizonte, daquelas luas que parecem perto demais pra ser real. Steve ficou olhando pra ela um momento a mais do que o habitual.</p><p>Sam tinha passado mais cedo e perguntado:<br>— Você realmente faz isso toda noite?<br>— Toda noite.<br>— E funciona?<br>Steve pensou um instante:<br>— Não sei se funciona. Mas me lembra por que acordo de manhã.</p><p>Steve foi pra cama, deitou, respirou fundo. A cidade lá fora fazia seu barulho de sempre. E o Capitão América dormiu leve, porque tinha feito sua promessa, e amanhã ia tentar cumprir mais uma vez. 🌊</p>"}
  ]},
  viuva: { nome:"Viuva Negra", emoji:"🕸️", l:[
    {t:"Como Natasha Escolheu o Lado Certo",b:"<p>Natasha Romanoff cresceu num mundo onde confiança era fraqueza e sentimento era perigo. Desde pequena aprendeu a ser rápida, silenciosa, precisa. Aprendeu idiomas, técnicas, estratégias. E aprendeu a não fazer perguntas sobre as ordens que recebia.</p><p>Por muito tempo isso foi suficiente. Até o dia em que Clint Barton apareceu. Ele tinha sido enviado com uma missão relacionada a ela. Mas no momento decisivo, Clint fez algo completamente inesperado: baixou o arco e disse:<br>— Eu tenho outra opção pra te oferecer.<br>Natasha ficou tensa:<br>— Que opção?<br>— Usar tudo que você sabe pra proteger as pessoas. De verdade. Do lado certo.</p><p>Natasha desconfiou. É claro que desconfiou. Desconfiança era a coisa que ela melhor sabia fazer. Mas havia algo genuíno naquele olho de Clint que ela não conseguia ignorar. Não era armadilha. Era oferta real.</p><p>Ela levou semanas pensando. E então disse sim.</p><p>Naquela noite, pelo primeira vez em anos, Natasha deitou e pensou: <b>Essa foi minha escolha. Não de mais ninguém. Minha.</b> E havia algo naquilo que ela não sabia nomear ainda, mas que parecia muito com liberdade. E ela dormiu. 🕸️</p>"},
    {t:"Natasha e o Ruivo",b:"<p>O gato se chamava Ruivo e era laranja, gordo, independente e absolutamente não convidado. Natasha tinha chegado em casa numa terça-feira chuvosa e encontrado ele sentado na porta do prédio miando com aquela expressão de gato que diz: <em>você vai me deixar entrar ou não?</em></p><p>— Não — Natasha disse em voz alta.<br>Ruivo miou de novo.<br>— Definitivamente não.<br>Três minutos depois ele estava dentro de casa.</p><p>Isso foi dois anos atrás. Agora Ruivo dormia na cama com ela toda noite, enrolado numa bolinha laranja no cantinho do travesseiro, ronronando com uma regularidade que Natasha achava, secretamente, mais eficaz que qualquer técnica de respiração.</p><p>Naquela noite ela chegou tarde de uma missão, tomou banho, se trocou, e quando foi pra cama Ruivo já estava lá esperando. Subiu no peito dela, andou em círculo duas vezes, e se acomodou. <b>Ronron. Ronron.</b></p><p>Natasha coçou a orelha dele:<br>— Como foi seu dia?<br>Ruivo ronronou mais alto.<br>— O meu também foi complicado.</p><p>E a Viúva Negra mais perigosa do mundo dormiu com um gato gordo ronronando no peito, e ficou tudo bem. 🐱</p>"},
    {t:"Natasha e a Varanda de Madrugada",b:"<p>Havia um horário que era só de Natasha: meia-noite e quinze. Depois que a missão acabava, depois que o relatório estava enviado, depois que tudo estava resolvido. Ela ia até a varanda e ficava lá exatos quinze minutos.</p><p>Não fazia nada nesse tempo. Só ficava em pé com uma xícara de chá, olhava pro horizonte da cidade e deixava o dia ir embora.</p><p>Clint tinha perguntado uma vez:<br>— O que você fica fazendo lá?<br>— Nada.<br>— Por quinze minutos?<br>— O nada tem que ter tempo suficiente pra funcionar.<br>Clint tinha ficado quieto, processando. Depois foi buscar um chá também.</p><p>Naquela noite as luzes da cidade piscavam lá longe como vagalumes preguiçosos. O vento trouxe cheiro de chuva que estava chegando. Natasha respirou fundo, contou mentalmente até quinze, soltou o ar.</p><p><em>Já fiz o suficiente hoje. Amanhã é outro dia.</em></p><p>Entrou, foi pra cama, colocou a cabeça no travesseiro. Ruivo subiu do lado. E Natasha dormiu. 🌙</p>"},
    {t:"Natasha e as Tres Estrelas Russas",b:"<p>Havia uma coisa que Natasha tinha carregado da infância e que nenhuma missão, nenhum treinamento, nenhuma vida nova tinha conseguido apagar: ela sabia encontrar três estrelas específicas no céu. Três estrelas próximas que ela chamava internamente de <em>as irmãs</em> — uma tradição que ninguém mais sabia que ela tinha.</p><p>Toda noite, antes de dormir, ela abria a janela por uns dois minutos e procurava as três irmãs. Não importava onde estivesse no mundo. Não importava o quanto o céu estava nublado — se tinha uma abertura, ela achava.</p><p>Naquela noite as irmãs estavam lindas. Céu completamente aberto, sem nuvens, e elas lá, próximas e brilhantes como sempre. Natasha ficou olhando um momento além do habitual.</p><p>Clint tinha dito uma vez, sem saber o que aquilo significava pra ela:<br>— Você fica olhando pro céu toda noite antes de dormir. Por quê?<br>— Verificando se as coisas importantes ainda estão no lugar.<br>— Estrelas?<br>— Algumas coisas não mudam. E isso é muito bom.</p><p>Natasha fechou a janela, foi pra cama, e dormiu com as irmãs ainda brilhando na memória. ✨</p>"},
    {t:"Natasha e a Missao que Era So Dela",b:"<p>Natasha tinha descoberto que a missão mais difícil da vida não era nenhuma das que ela tinha aceitado. Era uma bem mais simples: descansar de verdade.</p><p>Por anos, mesmo quando estava em casa, ela ficava de um estado de atenção. Ouvindo. Processando. Pronta. O corpo nunca desligava completamente.</p><p>Foi um médico que finalmente foi direto ao ponto:<br>— Você precisa dormir de verdade. Não apenas ficar deitada com os olhos fechados monitorando o ambiente.<br>— Isso é dormir.<br>— Não, isso é vigilância horizontal.<br>Natasha ficou quieta.<br>— Como eu faço diferente?<br>— Três coisas boas do dia. Antes de dormir. Em voz alta ou na cabeça. Faz o cérebro mudar de modo.</p><p>Naquela noite Natasha tentou:<br><em>Um: o café da manhã estava muito bom.<br>Dois: uma criança sorriu pra mim na rua sem nenhum motivo.<br>Três: o pôr do sol estava cor de laranja e rosa ao mesmo tempo.</em></p><p>Ficou quieta esperando. E percebeu: os ombros tinham descido. A mandíbula tinha soltado. O Ruivo ronronava do lado.<br>Ela dormiu. De verdade. 💤</p>"}
  ]},
  gaviao: { nome:"Gaviao Arqueiro", emoji:"🏹", l:[
    {t:"Como Clint Barton Virou o Gaviao Arqueiro",b:"<p>Clint Barton cresceu num circo. Não o tipo de circo divertido de filme — um circo real, itinerante, que viajava de cidade em cidade e onde todo mundo trabalhava de verdade. Clint lavava os animais, carregava caixas, ajudava a montar e desmontar as tendas.</p><p>Foi lá que conheceu o Trick Shot — um arqueiro velho, mal-humorado, que atirava flechas em alvos minúsculos de distâncias impossíveis. Clint ficava horas assistindo. Um dia o velho disse, sem nem olhar:<br>— Para de me encarar e pega um arco.<br>— Sério?<br>— Se você vai ficar aqui de qualquer jeito, aprende algo.</p><p>Clint errou os primeiros cinquenta tiros. Cinquenta. O velho não disse nada. Só apontava pro alvo. Clint respirava, mirava, soltava. Errava. Pegava outra flecha. De novo. Até o dia em que a flecha foi pro centro. E depois disso nunca mais parou.</p><p>Anos depois, quando Clint usou o arco pela primeira vez pra proteger alguém que não podia se defender, ele entendeu que o talento não era suficiente. A escolha de usar pra quem precisava — essa era a parte mais importante.</p><p>Naquela noite ele guardou o arco com cuidado redobrado. Havia aprendido: ferramentas de proteção merecem respeito. E dormiu com aquilo firme no peito. 🏹</p>"},
    {t:"Clint e o Ritual das Flechas",b:"<p>Todo mundo tinha seus rituais noturnos. Tony ficava no laboratório até cair. Steve desenhava. Bruce fazia chá. E Clint Barton passava quinze minutos guardando as flechas.</p><p>Não era sobre organização — embora o resultado fosse uma aljava perfeitamente arrumada. Era sobre desacelerar. Cada flecha ia pro lugar certo com um movimento suave e consciente. Era o único momento do dia em que a cabeça de Clint ficava completamente vazia de tudo, menos da tarefa das mãos.</p><p>Naquela noite, quando Clint terminou e foi pro quarto onde os filhos dormiam, entrou devagarzinho. Passou de cama em cama. Deu um beijo na testa de cada um no escuro total, guiado só pelo amor e pela memória do lugar de cada cama.</p><p>Depois foi pra cama, deitou, sentiu o cheirinho de casa que ele amava acima de qualquer coisa.<br>— Boa noite — ele disse baixinho pra ninguém em especial, ou talvez pra casa inteira.<br>A casa estava quieta. Os filhos respiravam. A lareira lá embaixo estava apagada mas ainda quente.</p><p>Clint fechou os olhos. E dormiu do jeito que só conseguia dormir ali: completamente. 💜</p>"},
    {t:"O Arqueiro e as Treze Estrelas",b:"<p>Clint tinha descoberto o truque por acidente. Numa noite de insônia, foi até a janela pra tomar ar e começou a contar as estrelas distraído. Quando chegou em treze, percebeu que estava com sono. Voltou pra cama. Dormiu.</p><p>Tentou de novo na noite seguinte. Treze estrelas. Sono.<br>Tentou com dez. Não funcionou tão bem.<br>Tentou com vinte. Passou do ponto, ficou mais acordado.<br>Treze. Era sempre treze.</p><p>Laura, a esposa, descobriu o ritual e ria toda vez:<br>— Você está com sono quando a décima terceira estrela aparece. Isso é o homem mais estranho do mundo.<br>— Funciona.<br>— Você é o Gavião Arqueiro e dorme contando estrelas.<br>— Todos os superpoderes têm um preço, Laura.</p><p>Naquela noite Clint abriu a janela do quarto, deixou entrar o ar fresco da noite, e começou. Uma, dois, três... a respiração foi ficando mais lenta. Quatro, cinco, seis... o barulho do dia foi saindo da cabeça. Sete, oito... os ombros desceram. Onze, doze...</p><p>Décima terceira. Uma estrelinha levemente amarelada, mais brilhante que as outras, como se piscasse só pra ele. Clint foi pra cama. Dormiu. 🌟</p>"},
    {t:"Clint e a Grama da Fazenda",b:"<p>Havia um lugar no mundo onde Clint Barton não era o Gavião Arqueiro. Era só o Clint: o marido, o pai, o homem que preferia carregar saco de adubo a carregar aljava. A fazenda. Longe de cidade, longe de barulho, longe de tudo que explodia ou precisava de salvamento.</p><p>Naquela tarde Clint tinha consertado a cerca do pasto norte, dado comida aos animais, pintado o celeiro numa parte que estava descascando. Trabalho físico simples, repetitivo, completamente satisfatório de um jeito que lutar contra vilões nunca era.</p><p>Quando terminou, não foi direto pra dentro. Deitou na grama do campo aberto. De costas, braços abertos, olhando pro céu que ficava azul de um jeito que só existia no interior.<br>Nuvens passavam. Mudavam de forma.<br>— Aquela parece um coelho — ele disse pra ninguém.<br>Um passarinho pousou na cerca a dois metros e ficou olhando pra ele.<br>— E você? Também tem o dia livre?</p><p>Sem perceber, Clint dormiu ali mesmo, na grama, com o sol descendo devagar. Quando acordou, estava de tardezinha e um dos cachorros da fazenda estava deitado do lado dele.<br>— Você tava me vigiando?<br>O cachorro lambeu o nariz dele.<br>Clint sorriu pro céu: esse foi o melhor sono da semana. 🌾</p>"},
    {t:"Clint e a Familia que Vale Tudo",b:"<p>Num jantar simples numa sexta-feira à noite, a família Barton estava toda reunida. A Laura tinha feito lasanha. Os filhos brigaram pelo maior pedaço de pão. O cão ficou sentado sob a mesa esperando um milagre. E Clint ficou alguns segundos olhando pra tudo aquilo antes de sentar.</p><p>Laura notou:<br>— O que foi?<br>— Nada. Só olhando.<br>— Tá com cara de quando você fica filosófico.<br>— Não sou filosófico.<br>— Você claramente está prestes a dizer algo sobre gratidão.<br>— Não estava.<br>— Estava.<br>Clint suspirou:<br>— Tava, sim.</p><p>Depois do jantar, depois dos filhos na cama, depois da louça guardada, Clint foi pro quarto, deitou, e ficou ouvindo a casa. A respiração dos filhos nos quartos do lado. O vento lá fora. O cachorro se acomodando no lugar dele no corredor.</p><p>Ele pensava às vezes: enfrentava os maiores perigos do mundo sem superpoderes. Fazia isso porque havia algo imenso pra proteger. E esse algo estava aqui, dormindo, seguro, nessa casa simples no meio do interior.</p><p>Não precisava de mais nada. E dormiu como o homem mais rico do mundo. 🏡</p>"}
  ]},
  pantera: { nome:"Pantera Negra", emoji:"🐾", l:[
    {t:"Como T'Challa se Tornou a Pantera Negra",b:"<p>T'Challa cresceu com o peso de uma herança enorme: seu pai era o rei T'Chaka, e um dia ele seria o rei. Desde criança aprendeu que liderar não era sobre ter poder — era sobre como você usava esse poder pelos outros.</p><p>— Um rei serve o povo — T'Chaka dizia.<br>— Mas o rei manda — o jovem T'Challa argumentava.<br>— Um rei que só manda não é rei. É só mais um homem com coroa.</p><p>Quando chegou o momento da coroação, havia quem achasse que T'Challa era jovem demais. E T'Challa sabia disso. Poderia ter usado o poder que já tinha para silenciar essas vozes. Em vez disso, ele ouviu. Considerou. E respondeu com ações, não com força.</p><p>A cerimônia aconteceu ao amanhecer, na Grande Planície de Wakanda, com o sol nascendo atrás das colinas. Quando a erva sagrada entrou no sistema de T'Challa e a conexão com os ancestrais se estabeleceu, ele sentiu uma coisa que não esperava: não era poder. Era responsabilidade. Imensa, real, pesada do jeito certo.</p><p>Naquela noite, sozinho no terraço do palácio, T'Challa olhou pras estrelas de Wakanda e fez uma promessa que ninguém mais ouviu:<br><em>Vou ser digno desse título.</em><br>E foi dormir com aquela promessa firme no coração. 🐾</p>"},
    {t:"T'Challa e a Musica da Floresta",b:"<p>A floresta de Wakanda tinha uma voz própria à noite. T'Challa a conhecia desde pequeno, tinha aprendido cada instrumento dessa orquestra invisível com o pai: o canto do grilo-dourado que só aparecia às dez da noite, o vento diferente nas folhas de bambu e nas folhas largas das cerejeiras antigas, o murmúrio do riacho que crescia depois da chuva.</p><p>Naquela noite T'Challa abriu as janelas do quarto de par em par e sentou na beirinha da cama, de olhos fechados, só escutando. Identificando cada som como um maestro reconhece cada instrumento.</p><p>Shuri tinha passado mais cedo e perguntado, com o jeito dela de sempre:<br>— Você está fazendo o que exatamente?<br>— Ouvindo.<br>— Ouvindo o quê?<br>— Wakanda.<br>— Você poderia só... olhar um relatório?<br>— Shuri. Sai do meu quarto.</p><p>Mas havia algo verdadeiro naquilo. Wakanda não era só a tecnologia, os recursos, as políticas. Era também aquela floresta cantando no escuro, as estrelas que brilhavam sem nuvens, o cheiro de terra molhada depois da chuva.</p><p>T'Challa se deitou devagar. A floresta continuou sua música. E o rei adormeceu embalado por ela. 🌿</p>"},
    {t:"T'Challa e as Historias do Pai",b:"<p>Havia uma prática que T'Chaka tinha com T'Challa quando ele era criança, que T'Challa nunca esqueceu: toda noite, o pai sentava na beira da cama e contava uma história dos ancestrais de Wakanda. Não mitos — histórias reais, de homens e mulheres reais que tinham feito coisas que importavam.</p><p>— Aqui está a história de Bashenga — T'Chaka começava sempre assim.<br>E T'Challa ficava completamente imóvel ouvindo, com os olhos arregalados, porque sabia que cada história tinha algo que ele ia precisar um dia.</p><p>Já adulto e rei, T'Challa ainda se lembrava dessas histórias antes de dormir. Naquela noite pensou em uma específica: a do primeiro pastor que encontrou o vibranium — um homem simples, sem poderes, que viu valor onde outros viam apenas pedra estranha. Não pela riqueza. Pelo potencial de proteger o povo.</p><p>T'Challa murmurou pro escuro:<br>— Vou ser digno de você, pai.<br>Não havia resposta. Mas havia o silêncio de Wakanda, que às vezes parecia muito com uma resposta.</p><p>Ele fechou os olhos com todas aquelas histórias como um cobertor ao redor do coração. 👑</p>"},
    {t:"T'Challa e a Chuva de Wakanda",b:"<p>A chuva em Wakanda chegava de um jeito que não existia em nenhum outro lugar: rápida, generosa, cheirando a terra vermelha e flores silvestres que só abriam quando a chuva batia nas pétalas. T'Challa reconhecia o cheiro antes mesmo de ouvir as primeiras gotas.</p><p>Naquela noite ele estava quase dormindo quando sentiu a mudança no ar. Depois o vento cresceu. Depois as primeiras gotas no parapeito da janela: <b>tap, tap, tap...</b> E então a chuva chegou de vez — barulhenta, viva, completamente generosa.</p><p>T'Challa sorriu com os olhos fechados. Reconhecia aquela chuva. Era a mesma desde sempre, a mesma que tinha molhado o pai, o avô, todos os reis de Wakanda antes dele. Ela não pertencia a nenhum reinado específico — era de Wakanda, eterna como a terra vermelha sob os pés.</p><p>A chuva foi aumentando, depois diminuindo, num ritmo que tinha sua própria música. T'Challa puxou o cobertor um pouco mais. Lá fora, Wakanda bebia a chuva e ficava mais viva. Lá dentro, o rei dormia, também mais vivo por causa dela. 🌧️</p>"},
    {t:"T'Challa e a Lua Roxa de Wakanda",b:"<p>Nas noites de lua cheia, o traje da Pantera Negra fazia algo extraordinário. As nanocamadas de vibranium captavam a luz lunar de um modo diferente da luz solar — criavam um brilho roxo profundo, pulsante, quase vivo. T'Challa nunca tinha conseguido explicar completamente o fenômeno. Shuri dizia que era refração. T'Challa achava que era outra coisa.</p><p>Naquela noite de lua cheia T'Challa ficou parado por um longo momento olhando pro traje no suporte. O brilho roxo pulsava devagarzinho. Quase como uma respiração.</p><p>Shuri tinha dito uma vez:<br>— A responsabilidade de ser a Pantera Negra não precisa pesar.<br>— Pesa.<br>— Só pesa se você carrega sozinho. Você tem Wakanda inteira com você.<br>T'Challa ficou quieto.<br>— Às vezes esqueço disso.<br>— Eu sei. Por isso estou aqui.</p><p>T'Challa se deitou. A lua cheia entrou pela janela e pintou o quarto inteiro de prata. O traje roxo e a lua prateada. T'Challa fechou os olhos com Shuri no pensamento, com Wakanda no coração, e dormiu protegido. 🌕</p>"}
  ]},
  guardioes: { nome:"Guardioes", emoji:"🚀", l:[
    {t:"Como os Guardioes Viraram uma Familia",b:"<p>Ninguém planejou os Guardiões da Galáxia. Aconteceu do jeito que as melhores famílias acontecem: por acidente, em circunstâncias caóticas, com pessoas completamente improváveis.</p><p>Peter Quill era um garoto da Terra que tinha sido levado pro espaço quando criança. Gamora era uma guerreira que queria recomeçar. Rocket era um guaxinim que confiava em ninguém. Groot era uma árvore enorme com o coração maior que o universo. Drax era um guerreiro que interpretava tudo literalmente e achava que sussurrar era desnecessário.</p><p>Num dia particularmente caótico, esses cinco se encontraram numa prisão espacial, por razões que levaria muito tempo pra explicar. E ali, naquele lugar horrível, cada um foi vendo algo nos outros. Rocket via genialidade em Peter. Peter via coragem em Gamora. Gamora via lealdade em Groot. E todos eles, mesmo sem admitir, sentiam que ao lado dos outros eram mais do que sozinhos.</p><p>Na primeira noite a bordo da nave, depois de terem escapado, cada um foi pra um canto diferente. Mas a nave estava quieta e estranhamente quentinha. E cada um deles dormiu melhor do que dormia há muito tempo. Porque tinham encontrado, sem procurar, aquela coisa que todo mundo precisa: família. 🚀</p>"},
    {t:"Peter Quill e a Fita da Mae",b:"<p>A fita cassete estava desbotada e um dos lados tinha um trecho que às vezes pulava. Mas era o objeto mais precioso que Peter Quill tinha no universo inteiro — uma seleção de músicas que a mãe tinha feito com amor, que ele ouvia toda noite antes de dormir, desde criança, em qualquer planeta, em qualquer circunstância.</p><p>Rocket tinha perguntado uma vez, com aquele jeito dele:<br>— Você ainda ouve fita? Isso é tecnologia de quatrocentos anos atrás.<br>— Sei.<br>— Existem seis bilhões de músicas disponíveis na rede galáctica.<br>— Sei disso também.<br>— Então por quê—<br>— Porque essas são as músicas da minha mãe, Rocket. Tá bom assim?<br>Rocket ficou quieto. Não disse mais nada sobre a fita.</p><p>Naquela noite Peter colocou o fone, apertou play, fechou os olhos. A primeira nota chegou e aquela coisa aconteceu — aquela coisa que ele não conseguia nomear, que era saudade e carinho e casa ao mesmo tempo.</p><p>Lá fora da porta ele ouviu o Groot emitindo a luzinha verde. O Rocket resmungando pra si mesmo. A Gamora com passos leves no corredor. Sua família estranha e barulhenta. Peter Quill adormeceu entre as estrelas, em paz. 🎵</p>"},
    {t:"Groot e as Flores de Madrugada",b:"<p>Enquanto os outros Guardiões dormiam, Groot fazia o que Groot sempre fazia à noite: crescia. Não de forma dramática — devagarzinho, quase imperceptível. Um milímetro aqui, um broto novo ali. Era o jeito de Groot descansar: florescendo.</p><p>Rocket tinha acordado uma vez no meio da noite e visto o processo. Ficou parado na porta do corredor por cinco minutos só olhando. Flores brancas minúsculas desabrochavam nos galhos de Groot em câmera lenta, abrindo pétala por pétala no escuro da nave. O cheirinho de floresta que acompanhava Groot ficava mais forte nessas horas.</p><p>No dia seguinte Rocket não falou nada. Mas tinha colocado uma garrafa d'água do lado do cantinho de Groot sem nenhuma explicação.</p><p>Groot tinha olhado pra água, depois pra Rocket, e dito:<br>— Eu sou Groot.<br>Que naquele contexto significava: <em>obrigado, amigo.</em><br>Rocket fez que não ouviu e saiu andando.<br>Mas sorriu quando virou de costas.</p><p>E naquela noite Groot foi pro cantinho, fechou os olhinhos, e começou de novo — a crescer, a florescer, a ser exatamente o que era. 🌱</p>"},
    {t:"Rocket e o Travesseiro Que Nao Conta Pra Ninguem",b:"<p>Era velho. Estava amassado. A capa original tinha desaparecido num acidente com óleo de motor há uns três anos. O que sobrou era um pedaço de tecido sem forma definida. Mas tinha o cheiro certo, o peso certo, e encaixava no braço de Rocket de um jeito que nenhum travesseiro novo jamais conseguiria replicar.</p><p>Naquele jantar, alguém na base tinha movido o travesseiro enquanto reorganizava o armário. Rocket passou vinte e dois minutos procurando antes de encontrá-lo no compartimento de ferramentas.<br>— QUEM COLOCOU AQUI?<br>Silêncio.<br>— EU SEI QUE FOI UM DE VOCÊS.<br>Peter ergueu as mãos:<br>— Não fui eu.<br>— Nem eu — disse Gamora.<br>— EU SOU GROOT — disse Groot, que claramente sabia mas não ia entregar ninguém.</p><p>Rocket pegou o travesseiro, foi pra cama, colocou debaixo do braço e ficou em silêncio por exatamente dois segundos antes de virar de lado e adormecer.</p><p>Peter, da porta, sussurrou pra Gamora:<br>— Ele tem um travesseirinho especial.<br>Gamora:<br>— Nunca fale sobre isso na frente dele.<br>Rocket, claramente ouvindo:<br>— Eu consigo ouvir vocês dois. E eu vou lembrar disso. 🦝</p>"},
    {t:"A Noite Perfeita dos Guardioes",b:"<p>Era uma raridade que os Guardiões aprenderam a valorizar: noite livre. Sem missão. Sem emergência galáctica. Sem ninguém precisando ser salvo de nada. A nave ia devagarzinho pelo espaço e cada um fazia o que queria.</p><p>Peter colocou uma playlist no sistema de som e ficou na poltrona principal olhando pelas janelas. Gamora pegou o livro que estava tentando terminar há semanas. Rocky ajustou uma peça que estava fazendo um barulhinho chato há três dias nos motores. Groot foi pro cantinho perto da janela panorâmica, fechou os olhinhos e começou a brilhar verde. Drax deitou no corredor — porque Drax achava chão melhor que cama, e ninguém mais discutia isso. Rocket encontrou o travesseiro, foi pro quarto, e desapareceu.</p><p>Em menos de uma hora, um por um, os Guardiões dormiam. A nave continuou sua viagem pelo espaço guiada pelo piloto automático, carregando todos eles com cuidado.</p><p>Lá fora: estrelas. Nebulosas. O universo imenso e silencioso. Lá dentro: a respiração de cinco seres completamente diferentes que haviam escolhido, de alguma forma, estar juntos.</p><p>Era uma das noites mais simples e mais perfeitas que aquela nave já tinha vivido. 🌌</p>"}
  ]},
  groot: { nome:"Groot", emoji:"🌱", l:[
    {t:"Por Que Groot Ficou com os Guardioes",b:"<p>Groot vinha de um planeta coberto de florestas antigas onde as árvores se comunicavam pelas raízes. Havia uma sabedoria naquele lugar que não precisava de palavras — só presença. Só estar junto.</p><p>Quando Groot foi pro espaço, sentiu falta disso. Planetas sem árvores, sem raízes, sem aquela conversa silenciosa entre coisas vivas. Era solidão de um jeito que criaturas que não eram árvores provavelmente nem conseguiam imaginar.</p><p>Mas então encontrou o Peter, que ouvia música com os olhos fechados como se fosse sagrado. O Rocket, que fingia não se importar com nada mas se importava com tudo. A Gamora, que carregava um peso enorme mas continuava em pé. O Drax, que sentia tudo de forma tão direta que era quase como uma árvore — sem filtros, sem disfarce.</p><p>E Groot entendeu: havia uma linguagem que não precisava de palavras. Não de raízes. Era outra coisa. Chamava presença. Chamava cuidado. Chamava família.</p><p>Groot chegou do lado deles e ficou. Simples assim. E na primeira noite a bordo da nave, brilhando verde no escuro enquanto os outros dormiam ao redor, Groot sentiu aquele calor de não estar mais sozinho. <b>Eu sou Groot.</b> O que significa: estou em casa. 🌱</p>"},
    {t:"Groot e o Boa Noite em Arvore",b:"<p>Todo mundo na nave sabia que Groot dizia apenas uma coisa. O que levou um tempo pra todo mundo entender era que aquela única frase podia significar coisas completamente diferentes dependendo do momento.</p><p>Peter era o único que entendia tudo — ele mesmo não sabia explicar como, mas entendia.<br>Todo dia antes de dormir, Groot fazia a ronda da boa noite. Chegava perto de cada Guardião e dizia aquelas três palavras no tom exato de cada um precisava ouvir.</p><p>Pro Peter, naquela noite: <em>você fez bom trabalho hoje. Boa noite, amigo.</em><br>Pro Rocket: <em>eu sei que você finge que não precisa. Mas eu tô aqui de qualquer jeito.</em><br>Pra Gamora: <em>você não precisa carregar tudo sozinha.</em><br>Pro Drax: <em>até amanhã, guerreiro.</em></p><p>Rocket fingia que não ligava, mas o rabo abanava. Gamora assentiu com um sorriso mínimo que dizia mais do que parecia. Peter respondeu: <em>boa noite, parceiro.</em></p><p>Depois da ronda, Groot foi pro cantinho, fechou os olhinhos, e a nave ficou um pouquinho mais gentil por causa daquele ritual simples. 🌸</p>"},
    {t:"Groot e a Semente que Guardava o Mundo",b:"<p>No oco do braço esquerdo de Groot, protegida com mais cuidado do que qualquer arma ou equipamento da nave, havia uma semente. Era do tamanho de um grão de arroz. Era do planeta onde Groot nasceu — um planeta que não existia mais.</p><p>Toda noite antes de dormir, Groot tirava a semente com uma delicadeza que seus braços enormes mal pareciam capazes de ter, e ficava olhando pra ela por um momento. Era tão pequena. Tão frágil. E ainda assim carregava dentro de si a memória de uma floresta inteira que não existia em nenhum outro lugar do universo exceto ali.</p><p>Rocket tinha visto o ritual uma vez e ficado quieto por um longo tempo antes de perguntar baixinho:<br>— É do seu planeta?<br>— Eu sou Groot. — Que significava: sim.<br>— Você vai plantar ela um dia?<br>— Eu sou Groot. — Que significava: quando encontrar o lugar certo.<br>Rocket assentiu. Não disse mais nada. Mas a noite seguinte ele tinha colocado um potinho de terra boa do lado do cantinho de Groot, só por precaução.</p><p>Groot fechou os dedos de madeira ao redor da semente, guardou de volta, e foi dormir sonhando com a floresta que um dia ia existir de novo. 🌳</p>"},
    {t:"Grootzinho e a Vasinha Vermelha",b:"<p>Depois de um evento que levou um tempo pra todo mundo processar, Groot tinha voltado a ser um filhotinho pequenininho — quase do tamanho de uma mão. Peter tinha encontrado uma vasinha vermelha num mercadinho espacial e plantado o Grootzinho ali, com uma seriedade que os outros Guardiões acharam inesperada.</p><p>A vasinha ficava na mesinha de cabeceira do Peter. Toda manhã antes de qualquer outra coisa, Peter regava o Grootzinho com cuidado. Exatamente a quantidade certa — ele tinha pesquisado.<br>— Bom dia, parceiro. Dormiu bem?<br>Grootzinho balançava um galhinzinho fininho que Peter interpretava como <em>muito bem, obrigado.</em></p><p>Rocket tinha visto isso e comentado:<br>— Você tá criando a árvore como se fosse filho.<br>— E daí?<br>— Nada. Só observando.<br>— Rocket.<br>— Que foi?<br>— Você cuida do motor desse jeito todo dia também.<br>Rocket ficou quieto. Saiu da cozinha.</p><p>À noite, quando as luzes apagavam, Grootzinho começava a emitir um brilho verde suave que iluminava levemente o quarto do Peter. Era como ter uma vela viva no cantinho. Peter fechava os olhos com aquele verde gentil, e dormia. 💚</p>"},
    {t:"Groot e a Chuva do Planeta Verde",b:"<p>Num planeta que os Guardiões visitaram por alguns dias, havia uma coisa extraordinária: quando chovia, a chuva era morna. Não fria, não quente — morna como banho de bebê, cheirando a grama fresca e flores que só abriam quando as gotas batiam nas pétalas.</p><p>Os outros Guardiões correram pra dentro quando a chuva começou. Rocket em velocidade recorde porque ele odiava se molhar. Gamora com um guarda-chuva que tirou de não se sabe onde. Peter com o capacete. Drax ficou parado na chuva porque Drax não entendia por que esconder-se de água.</p><p>E Groot? Groot abriu os braços. Virou o rosto pro céu. Fechou os olhos. E ficou parado com um sorriso enorme enquanto a chuva morna caía em cada folha, cada galho, cada raiz.</p><p>Rocket, da janela:<br>— GROOT! Você vai ficar encharcado!<br>Groot não respondeu. Só ficou mais feliz.<br>Mais tarde, de volta à nave pingando água por todo lado — Rocket reclamou por exato onze minutos — Groot foi pro cantinho, se sentou, e dormiu o sono mais profundo e satisfeito de toda a viagem.</p><p>Sonhou com chuva morna, com terra que absorve água, com flores abrindo devagar. O sonho perfeito de uma árvore. 🌧️</p>"}
  ]}
};

var PAW = {
  ryder: { nome:"Ryder", emoji:"🧢", l:[
    {t:"Como Ryder Criou a Patrulha Canina",b:"<p>Ryder tinha nove anos quando encontrou o Chase. Era um filhotinho de pastor-alemão perdido perto da praia, sozinho num dia de chuva, latindo pra um carro tombado na estrada como se tentasse avisar alguém. Ryder parou a skateboard, olhou pro filhote, olhou pro carro, e sem pensar duas vezes foi ajudar.</p><p>Depois, quando estava cuidando do Chase em casa, uma ideia tomou conta da cabeça de Ryder com aquela intensidade que não largava até virar realidade: cachorros com habilidades especiais, equipamentos feitos pra cada um, trabalhando em equipe. Uma Patrulha.</p><p>A mãe olhou os desenhos que ele fazia no caderno:<br>— Isso é muito ambicioso, Ryder.<br>— Eu sei.<br>— Vai precisar de muito trabalho.<br>— Eu sei.<br>— E você tem certeza?<br>Ryder olhou pro Chase que estava no canto, com as orelhas em pé olhando pra ele.<br>— A gente tem certeza. Né, Chase?<br>Chase latiu uma vez. Firme.</p><p>Nos meses seguintes, Ryder encontrou cada cachorrinho da equipe. Marshall, Skye, Rocky, Zuma, Rubble — cada um com sua história, cada um com seu dom. Na noite da primeira missão real, quando tudo funcionou, Ryder deitou na cama olhando pro teto com um sorriso que não cabia no rosto.<br>— Conseguimos — ele sussurrou.<br>E dormiu o sono de quem encontrou seu propósito. 🐾</p>"},
    {t:"Ryder e a Missao do Barco do Capitao",b:"<p>A chamada chegou às seis da manhã. O celular da Patrulha tocou, Ryder acordou na hora, e a voz do Capitão Turbot veio pela linha cheia de drama:<br>— RYDER! Meu barco! A tempestade! As rochas! O fundo do mar está chamando pelo meu barco, Ryder!<br>— Capitão, respira. O barco encalhou ou afundou?<br>— Encalhou! Por enquanto!<br>— A gente chega em dez minutos.</p><p>Zuma chegou com o hovercraft laranja cortando as ondas. <b>SWOOSH!</b> O barco do Capitão tinha encalhado entre duas pedras, inclinado pra esquerda, com o mastro gemendo.<br>— Ele vai quebrar se a maré subir — Rocky avaliou rápido.<br>— Então a gente trabalha antes da maré subir — Ryder respondeu.</p><p>Rocky jogou os cabos. Zuma prendeu pelo lado da água. Chase coordenou o tráfego no cais. Em vinte minutos o barco estava livre, rebocado pro porto, e o Capitão Turbot abraçava o mastro com lágrimas nos olhos:<br>— Meu amor! Você voltou pra mim!<br>— Ele está falando com o barco — Rubble sussurrou.<br>— Sempre faz isso — Skye respondeu.</p><p>De noite Ryder deitou pensando naquela manhã. Tinha começado o dia correndo, resolvido um problema em vinte minutos, e o Capitão Turbot tinha saído abraçando o barco. Nem sempre o trabalho de herói era glamoroso. Mas sempre importava. Dormiu bem. 💙</p>"},
    {t:"Ryder e o Desenho das Criancas da Escola",b:"<p>Numa manhã comum, Ryder chegou no quartel e encontrou um envelope na porta. Escrito na capa, em letras de criança que eram mais para cima que pra baixo: <em>Para Ryder e a Patrulha Canina.</em></p><p>Dentro: vinte e três desenhos. Cada criança da turma da professora Ana tinha desenhado um herói favorito. Tinha Chase na viatura com sirene e tudo. Tinha Marshall apagando um fogo enorme. Tinha Skye num céu cor de laranja. Tinha o Ryder no centro de um círculo com todos os cachorrinhos ao redor, e embaixo escrito em letras gigantes:<br><em>Obrigado por cuidar da gente.</em></p><p>Ryder chamou a equipe. Espalhou os desenhos no chão do quartel. Todo mundo ficou olhando em silêncio por um momento.<br>Marshall: — Alguém me fez no desenho com as orelhas muito grandes.<br>Chase: — As minhas estão perfeitas.<br>Rubble: — Eu pareço um ursinho de pelúcia nesse aqui. Eu amei.<br>Skye: — O meu helicóptero tem cinco rotores. Ela inventou.<br>— Mas ficou bonito — Ryder disse.</p><p>Naquela noite Ryder deixou os desenhos encostados na parede do quarto. Antes de dormir, olhou pra eles mais uma vez.<br>Era por isso que valia a pena. Sempre foi. 🏆</p>"},
    {t:"Ryder e a Ronda da Boa Noite",b:"<p>Havia uma coisa que Ryder fazia toda noite, nunca pulava, não importava o cansaço ou o horário: a ronda da boa noite.</p><p>Pegava a lanterninha, saía do quarto e ia até o quartel. Passava em cada casinha devagarzinho. Chase às vezes ainda estava acordado verificando o equipamento — Ryder dava um tapinha na porta e Chase latia uma vez, como <em>tá tudo bem aqui.</em> Marshall geralmente já estava roncando antes de dez e meia, e remexia as orelhas quando Ryder passava, mesmo dormindo. Skye ficava com o narizinho de fora do cobertor e a porta entreaberta pra ver o céu. Rocky tinha as ferramentas organizadas do lado da cama. Zuma cheirava a água salgada mesmo dormindo. Rubble roncava baixinho e sorria no sono — Ryder nunca tinha conseguido entender por que Rubble sorria dormindo, mas adorava aquilo.</p><p>Depois da ronda, Ryder voltava pro quarto com aquela sensação de completude que não tinha nome exato mas que era muito boa. Todo mundo estava bem. Todo mundo estava seguro.</p><p>— Boa noite, galera — ele dizia baixinho pra ninguém e pra todo mundo ao mesmo tempo. E dormia de verdade. 🐾</p>"},
    {t:"Ryder e a Tempestade que Passou",b:"<p>A tempestade chegou antes do previsto. Ryder estava jantando quando o céu escureceu de um jeito que não parecia certo, e então o vento começou — forte, sacudindo as janelas, derrubando as cadeiras do jardim com um <b>CATACLAC!</b></p><p>Celular da Patrulha. Ryder pegou antes do segundo toque:<br>— Patrulha Canina, pode falar.<br>— RYDER! — era o Capitão Turbot, claro. — A tempestade! O meu barco! As árvores! A cidade!<br>— Capitão. Uma coisa de cada vez. O barco está no porto?<br>— Está!<br>— Porto é seguro. Fique em casa. A gente resolve o resto.</p><p><b>BUUUM!</b> Um trovão enorme. <b>CRAK!</b> Um raio iluminou o céu. Ryder estava de pé, equipamento ligado, enquanto a equipe se organizava. Chase garantiu as ruas. Zuma verificou a área costeira. Rocky protegeu os postes que ameaçavam cair. Marshall ficou de sobreaviso médico. Skye fez reconhecimento aéreo entre os raios — com cuidado, porque até a Skye respeitava raio.</p><p>Quando a tempestade passou, a cidade estava inteira. Sem acidentes. Sem feridos. Ryder deitou naquela noite ouvindo o silêncio que a chuva deixa — aquele silêncio molhado e limpo — e dormiu como pedra. ⛈️</p>"},
    {t:"Ryder e o Pijama das Patinhas",b:"<p>A mãe de Ryder tinha costurado o pijama quando ele tinha uns quatro anos: azul claro, com patinhas estampadas em todo o tecido. Agora ficava curto nos braços e nas pernas, mas Ryder ainda guardava com cuidado numa gaveta específica.</p><p>Nos dias difíceis — os de missão demorada, os de problema que precisou de muita criatividade, os de quando o cansaço chegava de verdade — Ryder colocava o pijama das patinhas.</p><p>Chase tinha visto uma vez quando foi buscar o Ryder pra uma chamada de emergência noturna:<br>— Ryder, você está com...<br>— Pijama das patinhas. Problema?<br>Chase olhou pro pijama, depois pro Ryder, e com toda a seriedade policial respondeu:<br>— Nenhum problema. Vamos?</p><p>Naquela noite, depois de uma missão que tinha durado mais do que o planejado, Ryder colocou o pijama, foi até o quarto, olhou pra foto dos cachorrinhos na mesinha. Chase todo composto. Marshall com a língua pra fora. Skye pulando. Rocky com uma ferramenta. Zuma na água. Rubble sorrindo com todo o rosto.</p><p>— Boa noite, galera.<br>Apagou a luz. O pijama das patinhas fez o resto. 🐾</p>"},
    {t:"Ryder e o Que Vale Mais Que Medalha",b:"<p>Num dia especialmente longo, Ryder tinha ajudado a resolver quatro missões diferentes: um cervo preso numa cerca, o caminhão de sorvete com o freio travado morro abaixo, um incêndio pequeno na padaria da cidade, e a Sra. Rubble que não conseguia alcançar o gato no telhado.</p><p>De volta no quartel, já quase meia-noite, Ryder começou a desligar os equipamentos quando ouviu um barulhinho na porta. Era a Sra. Rubble — não a dona do Rubble, uma senhora diferente com o mesmo sobrenome — com uma vasilha coberta por um pano.</p><p>— Fiz bolo de cenoura pra vocês. Sei que é tarde. Mas não podia dormir sem agradecer.<br>Ryder ficou parado na porta:<br>— A senhora não precisava...<br>— Eu quis. Tem diferença.</p><p>O bolo estava ainda morno. A equipe reuniu em volta da mesa do quartel, exaustos e com farinha de cenoura na boca, e ninguém falou nada por uns dois minutos. Era o tipo de silêncio de gente que estava cansada mas grata ao mesmo tempo.</p><p>Ryder foi pra cama pensando que nenhuma medalha do mundo tinha o sabor de bolo de cenoura feito por alguém que queria agradecer de verdade. 🍰</p>"},
    {t:"Ryder e as Estrelas da Baia",b:"<p>Era a hora favorita de Ryder: depois que todas as missões acabavam, depois que o quartel estava em silêncio, quando ele ia até a janela do quarto e olhava pro mar.</p><p>A Baía da Aventura de noite era outra coisa. A água ficava escura mas não assustadora — aquela escuridão tranquila de coisa que está descansando. As estrelas se refletiam na superfície em fragmentos tremidos. Lá longe, a luzinha do farol girava devagar: um pulso lento e regular, como respiração.</p><p>Certa noite Chase estava passando pelo corredor e viu Ryder na janela:<br>— Você faz isso toda noite.<br>— Boa noite, Chase.<br>— Não é sono?<br>— É. Mas primeiro... — Ryder apontou pro mar. — Preciso ver que tá tudo certo.<br>Chase foi até a janela e ficou do lado por um momento. Os dois olharam pro mar juntos em silêncio.<br>— Tá tudo certo — Chase disse.<br>— Tá tudo certo — Ryder concordou.</p><p>Chase foi dormir. Ryder ficou mais um minuto. Depois foi pra cama, e com o barulhinho das ondas chegando pela janela, dormiu o sono tranquilo de quem sabe que a cidade está bem. 🌊</p>"},
    {t:"Ryder e os Sonhos de Amanha",b:"<p>Ryder tinha um caderninho que ficava na mesinha de cabeceira — não um diário de missões, não um bloco de anotações técnicas. Era um caderninho de ideias. Toda noite, antes de apagar a luz, ele escrevia pelo menos uma ideia nova: um equipamento que poderia melhorar, uma forma diferente de responder a uma situação, algo que tinha visto naquele dia que poderia ser útil pra equipe.</p><p>Skye tinha visto o caderninho uma vez:<br>— O que é isso?<br>— Ideias pra amanhã.<br>— Você escreve ideias antes de dormir?<br>— Se eu não escrever, acordo sem lembrar.<br>— Você poderia só... dormir?<br>— As ideias aparecem quando o dia para. Não tem outro horário.<br>Skye ficou pensando.<br>— Posso ter um também?<br>— Tem um monte sobrando na gaveta.</p><p>Naquela noite Ryder escreveu três ideias, fechou o caderninho, apagou a luz. O quarto ficou no escuro quietinho. Lá fora, a baía estava calma. A Patrulha estava dormindo. E Ryder fechou os olhos com a cabeça cheia de amanhãs possíveis, e dormiu sorrindo. 🌟</p>"},
    {t:"Ryder e o Time Mais Incrivel do Mundo",b:"<p>Às vezes, quando estava quase dormindo, Ryder ficava pensando em cada um dos cachorrinhos e o que tornava cada um especial. Não as habilidades técnicas — essas eram ótimas, mas não era isso.</p><p>Chase se importava com cada detalhe de cada missão porque se importava com as pessoas. Marshall errava, caía, se levantava rindo e continuava porque a coragem dele não dependia de não ter medo — dependia de ir mesmo assim. Skye amava o que fazia de um jeito que deixava todo mundo ao redor mais animado. Rocky via solução onde outros viam problema. Zuma trazia alegria pra qualquer situação, até pra tempestade. Rubble era a prova de que gentileza é força, não fraqueza.</p><p>E todos eles, sem exceção, se importavam uns com os outros. De verdade. Essa era a parte que Ryder achava mais incrível: eles não eram um time só porque trabalhavam juntos. Eram um time porque se escolhiam.</p><p>Ryder fechou os olhos com esse pensamento quentinho no peito, a baía lá fora fazendo o barulhinho dela de sempre, e dormiu profundamente — o líder do time mais incrível que ele poderia imaginar. ☀️</p>"}
  ]},
  chase: { nome:"Chase", emoji:"🚔", l:[
    {t:"Como Chase Virou o Policial da Patrulha",b:"<p>Ryder tinha encontrado Chase num dia de chuva perto da estrada, sozinho, um filhotinho de pastor-alemão que fazia uma coisa estranha: ficava na frente dos carros que passavam latindo com tudo, como se tentasse fazê-los parar. Ryder olhou e entendeu em segundos o que estava acontecendo: havia uma árvore caída na curva logo à frente que os motoristas não poderiam ver.</p><p>O filhote estava sendo guarda de trânsito por conta própria. Com três meses de vida.</p><p>Ryder parou o tráfego, removeu a árvore, e então agachou do lado do Chase:<br>— Você fez isso sozinho? Sabia que era perigoso?<br>Chase inclinou a cabeça pra um lado. Depois pro outro. Então assentiu.<br>— Quer continuar fazendo isso? De forma oficial?<br>O Chase latiu uma vez. Claramente sim.</p><p>No dia em que ganhou o uniforme e a viatura azul, Chase ficou imóvel por alguns segundos com as orelhas em pé e o olhar sério de policial. Depois olhou pro Ryder e latiu — não de animação, mas de compromisso. Era diferente. Ryder sentiu a diferença.</p><p>Naquela noite, Chase dormiu ao lado da viatura azul com aquele orgulho quieto de quem encontrou exatamente o que veio fazer. 🚔</p>"},
    {t:"Chase e a Ultima Ronda",b:"<p>Era um hábito que Chase tinha criado sozinho, sem ninguém pedir: a última ronda da noite. Antes de dormir, saía na viatura uma última vez e percorria as ruas da Baía da Aventura devagarzinho, janela aberta, orelhas atentas.</p><p>Naquela noite a cidade estava quieta. Quieta do jeito bom — a quietude de gente dormindo, de casas aquecidas, de coisas no lugar. O gato do Seu Calvin dormia no muro. O parque estava vazio mas as luzes de segurança piscavam certinhas. A padaria tinha fechado às dez e o Seu Gustavo tinha deixado a luz do forno apagada como sempre.</p><p>Chase foi passando por cada rua, cada esquina, cada cantinho que conhecia de cor. Nada errado. Tudo certo.</p><p>De volta ao quartel, ele estacionou a viatura, ficou um segundo olhando pra ela. Depois foi pra casinha azul, deu as três voltas obrigatórias no colchão — ele sabia que era bobagem, mas era necessário —, e se deitou.</p><p>— Missão cumprida — ele murmurou pra si mesmo no escuro.<br>E dormiu com a satisfação firme de quem verificou que tudo estava bem antes de descansar. 🌙</p>"},
    {t:"Chase e o Ossinho Azul",b:"<p>O ossinho de borracha azul estava desaparecido e Chase tinha passado a tarde inteira procurando. Embaixo da caminha: não. Nos brinquedos: não. No comedouro: não. Na viatura: não. Atrás da casinha: não.</p><p>Chase foi ao Ryder com o rosto mais sério do mundo:<br>— Ryder. Preciso relatar um objeto perdido.<br>Ryder tentou não sorrir:<br>— Que objeto?<br>— Meu ossinho azul. O Ryder me deu quando entrei pra Patrulha. Valor sentimental incalculável. Precisa ser localizado.<br>— Entendido. Vai abrir um B.O.?<br>Chase considerou:<br>— Acho que sim.</p><p>Foi o Rubble quem achou — debaixo da roda traseira da viatura, onde tinha caído numa missão. Rubble devolveu com cerimônia, que era o jeito do Rubble fazer tudo, e Chase ficou com o ossinho na boca por um longo momento sem falar nada.</p><p>Depois foi pra caminha, colocou o ossinho do lado, se deitou. Fechou os olhos.</p><p>O ossinho estava frio do metal da roda. Mas era o ossinho certo, no lugar certo, do lado certo. Chase dormiu em paz. 🦴</p>"},
    {t:"Chase e o Elogio que Ficou no Peito",b:"<p>Tinha sido uma missão de três horas num dia de vento forte. Um veleiro tinha ido pro lugar errado, uma criança estava a bordo, a maré estava entrando. Chase tinha coordenado tudo do cais: o Zuma na água, a Skye no ar, o Marshall de sobreaviso. Cada um no lugar certo, cada passo certo.</p><p>Quando acabou e a criança estava segura nos braços da mãe, o Ryder foi até o Chase e agachou na frente dele. Olhou nos olhos e disse:<br>— Você liderou essa missão com uma precisão que eu raramente vejo. Cada decisão foi certa. Cada segundo importou. Você salvou essa criança, Chase. E eu tenho muito orgulho de você.</p><p>As orelhas de Chase foram pra cima sozinhas. O rabo começou a abanar antes que ele percebesse. Ele ficou quieto porque não sabia o que dizer — não porque não tinha nada pra dizer, mas porque tinha coisa demais e não sabia por onde começar.</p><p>De noite, deitado na caminha, Chase ainda ouvia as palavras do Ryder. Havia uma diferença entre fazer bem e ser visto fazendo bem. As duas coisas importavam. Dormiu com os olhos já fechando e o peito cheio. 💛</p>"},
    {t:"Chase e a Chuva no Telhado Azul",b:"<p>A chuva tinha chegado às nove da noite, de mansinho. Primeiro aquele cheiro específico de terra molhada que Chase reconhecia antes de qualquer gota cair. Depois o vento mudou. Depois: <b>tap, tap, tap...</b> No telhado da casinha azul.</p><p>Chase estava deitado com o focinho espiadinho pelo cobertor, as orelhas apontadas pro teto, ouvindo. Não era chuva de emergência — não tinha trovão, não tinha vento bravo, não havia nada que pedisse ação. Era só chuva limpa e boa lavando o mundo lá fora.</p><p>Ele ficou escutando por um tempo. <b>Tap tap tap. Tap tap tap.</b> Havia um ritmo naquilo. Não era música, mas era parecido com música. O tipo de coisa que a natureza faz quando não está tentando fazer nada em especial.</p><p>Chase fechou os olhos. O barulhinho continuou. A casinha estava seca. A viatura estava no abrigo. A Baía estava em ordem.</p><p>O policial mais dedicado da Patrulha dormiu embalado pela chuva, as orelhas relaxando devagarzinho, a respiração ficando mais funda a cada minuto. Tudo certo. 🌧️</p>"}
  ]},
  marshall: { nome:"Marshall", emoji:"🚒", l:[
