    {t:"Como Marshall Virou o Bombeiro da Patrulha",b:"<p>Marshall era um dálmata que Ryder encontrou no dia mais caótico possível: numa manhã em que o próprio Marshall tinha derrubado uma pilha de caixas, escorregado no próprio rabo, derrubado mais duas caixas tentando se levantar, e na confusão toda ainda conseguiu colocar o fogo do varal da Sra. Betina com o copo d'água que carregava pra beber.</p><p>Ryder ficou olhando pra cena por uns cinco segundos processando. Depois disse:<br>— Você apagou aquele fogo de propósito?<br>Marshall, ainda no chão:<br>— Não. Mas funcionou!<br>— Você tropeça em tudo?<br>— Com frequência consistente.<br>— Mas não desiste?<br>Marshall pensou por um segundo:<br>— Não sei fazer isso.</p><p>Ryder tinha sorrido. E viu naquilo algo precioso: coragem que não dependia de ser perfeito. A disposição de continuar tentando independente de quantas caixas caiam no caminho.</p><p>No dia em que Marshall ganhou o caminhão vermelho, ele estava tão animado que escorregou na escada de subir nele. Mas subiu. E a primeira coisa que disse, sentado no alto do caminhão vermelho com o capacete torto:<br>— Tô bem! E tô pronto!<br>E estava. 🚒</p>"},
    {t:"Marshall e o Dia que Valeu Tudo",b:"<p>De manhã: um fogo pequeno num galho de árvore perto da escola que assustou as crianças. Marshall chegou, apagou, fez os primeiros socorros numa criança que tinha caído correndo, e ainda ficou pra contar pra turma como funciona um extintor de incêndio, que acabou virando uma aula improvisada de vinte minutos.</p><p>De tarde: um senhor que tinha se machucado na calçada irregular perto da praça. Marshall chegou antes da ambulância, cuidou com todo o cuidado, conversou com o senhor enquanto esperava o resgate pra ele não ficar com medo. O senhor tinha segurado a pata dele e dito: <em>Você tem mãos muito gentis pra alguém tão grande.</em></p><p>De noite: o gato da Sra. Sofia numa cerca. Claro.</p><p>Quando voltou pro quartel e tomou o banho mais longo de toda a semana — Marshall adorava banho, era um dos grandes prazeres da vida dele — foi pra caminha e deitou de barriga pra cima esticando as quatro patas pro alto.</p><p>— Uaaahhh! — o bocejo foi dos grandes.<br>Fechou os olhos. Pensou no senhor com mãos gentis. Nas crianças aprendendo sobre extintor. No gato da Sra. Sofia que ainda ia aparecer de novo na cerca na semana que vem, com certeza.</p><p>Marshall adormeceu sorrindo. 🚒</p>"},
    {t:"Marshall e o Tombo de Boa Noite",b:"<p>Marshall estava indo pra cama depois de um longo dia, pensando em nada específico — aliás, pensando em biscoito, que era um assunto que sempre aparecia na hora errada — quando o pé esquerdo encontrou o pé direito num momento de total e completa distração.</p><p><b>BUM!</b></p><p>Marshall foi ao chão. As quatro patas pra cima por um segundo. Depois ficou deitado no chão da estação olhando pro teto com a expressão mais perplexa do mundo, como se fosse a primeira vez que isso acontecia e não a décima quarta daquela semana.</p><p>Ficou parado por uns três segundos. Então começou a rir. Aquela risada gostosa e espontânea de quem não tem vergonha de si mesmo e acha genuinamente engraçado.</p><p>— TÔ BEM! — ele anunciou pro espaço vazio.<br>Ninguém estava lá. Mas era importante avisar de qualquer jeito.</p><p>Se levantou com muito mais cuidado desta vez, subiu na caminha com atenção redobrada, se aninhou do jeito favorito dele — sempre no canto esquerdo, encostado na parede — e fechou os olhos ainda com um sorriso.</p><p>Marshall adormeceu sendo exatamente quem era. E quem ele era estava muito bem. ❤️</p>"},
    {t:"Marshall e o Segredo do Remedio Certo",b:"<p>O Dr. Marshall — ele gostava do título, sim — tinha uma teoria médica que sempre compartilhava com quem quisesse ouvir, e também com quem não queria:</p><p>— Dormir bem é o melhor remédio que existe. Melhor que qualquer curativo, qualquer xarope, qualquer injeção.<br>Rubble: — Mas às vezes precisa de curativo.<br>— Depois de dormir, o curativo funciona melhor.<br>Chase: — Isso não faz sentido.<br>— FAZ. O corpo se repara durante o sono. As células se renovam. O sistema imune trabalha. É ciência!<br>Rocky: — Você tá inventando.<br>— NÃO ESTOU. Pesquisem!</p><p>Naquela noite Marshall seguiu o próprio receituário com precisão: água antes de deitar, luzes apagadas, nada de olhar pro teto pensando em coisa complicada, e um pensamento bom — a criança que tinha socorrido de tarde e que tinha dado um abraço nele quando foi embora.</p><p>Respirou fundo. Fechou os olhos. E o Dr. Marshall, que receitava descanso pra todos, finalmente descansou também. 🏥</p>"},
    {t:"Marshall e as Flores do Sonho",b:"<p>Marshall tinha um sonho recorrente que ele nunca tinha contado pra ninguém porque achava que iam rir. No sonho, a mangueira do caminhão soltava água colorida em vez de água normal — azul, verde, amarela — e por onde a água passava, em vez de deixar cinza e fumaça, brotavam flores.</p><p>Flores vermelhas saindo do asfalto molhado. Flores roxas nos galhos que tinham queimado. Um tapete de margaridas onde antes tinha chamas.</p><p>No sonho as pessoas aplaudiam. As crianças corriam entre as flores. E Marshall corria no meio de tudo com a língua de fora e o rabo em máxima velocidade.</p><p>Numa noite, Skye tinha acordado cedo e visto Marshall com as patinhas se mexendo no sono — correndo no sonho:<br>— Marshall. Psst. O que você tá sonhando?<br>Marshall não acordou, mas murmurou algo que soou como: <em>flores nas chamas...</em><br>Skye ficou olhando por um momento. Depois foi embora sem acordar ele.</p><p>No café da manhã ela disse:<br>— Você sorri dormindo, você sabe?<br>Marshall: — Não sou eu que faço isso.<br>Mas era. E ele sabia que era. 🌺</p>"}
  ]},
  skye: { nome:"Skye", emoji:"✈️", l:[
    {t:"Como Skye Virou a Pilota da Patrulha",b:"<p>Ryder encontrou Skye num aeroclube abandonado nos arredores da Baía da Aventura. Ela estava sentada na grama com as patas dianteiras apoiadas na cerca que separava o campo de pouso e as orelhinhas em pé, olhando pra um avião pequeno parado no hangar com uma expressão de quem quer muito algo e não sabe como pedir.</p><p>Toda vez que um avião passava lá em cima, as orelhas iam pro alto e ela acompanhava o som com a cabeça inclinada até o ruído sumir no horizonte. Ryder ficou observando em silêncio por uns cinco minutos antes de se aproximar.</p><p>— Você quer voar, né?<br>Skye virou pro lado. Olhou pra ele. E latiu — não de animação impulsiva, mas de confirmação. Um latido que dizia: <em>sim, e faço isso faz tempo.</em></p><p>Ryder passou semanas desenhando e construindo. O helicóptero rosa ficou perfeito: do tamanho certo, controles pra patinhas, visibilidade máxima, equipamentos de resgate integrados. No dia em que Skye subiu pela primeira vez e decolou, o grito dela era de alegria pura — aquele tipo de alegria que só existe quando você finalmente chega no lugar onde deveria estar.</p><p>Naquela noite Skye dormiu olhando pro céu pela janelinha da casinha rosa, com um sorriso que não sumiu nem quando fechou os olhos. ✈️</p>"},
    {t:"Skye e o Voo de Madrugada",b:"<p>Não era permitido voar de madrugada sem missão. Regra da Patrulha, segurança aérea, bom senso geral. Skye sabia de tudo isso.</p><p>E ainda assim, naquela noite de lua cheia em que o céu estava completamente limpo, ela foi até o Ryder e ficou na porta do quarto dele até ele acordar.<br>— Skye. São duas da manhã.<br>— Eu sei.<br>— O que foi?<br>— O céu está perfeito. Eu juro que é seguro. Eu só quero dar uma volta rápida.<br>Ryder ficou olhando pra ela por um momento sonolento. Depois olhou pro céu pela janela. A lua estava enorme e laranja.</p><p>— Quinze minutos.<br>— Vinte.<br>— Dezessete e meio.<br>— Aceito.</p><p><b>WHOOSH!</b> O helicóptero subiu no silêncio da madrugada. Lá de cima, a Baía da Aventura brilhava com os reflexos da lua. As casas estavam apagadas. O mar estava escuro e calmo. E o céu... o céu era todo dela naquele momento.</p><p>Skye voou os dezessete minutos e meio mais bonitos da vida dela. Depois voltou, pousou suave, e foi pra cama com o coração cheio. ✈️</p>"},
    {t:"Skye e as Orelhas no Vento",b:"<p>Havia uma sensação que Skye colocava como a melhor do mundo inteiro: o vento nas orelhas quando o helicóptero pegava velocidade máxima. As orelhinhas iam pra trás, o focinho ficava no ar, os olhos semicerrados — e havia um sorriso que aparecia automaticamente, sem pedir permissão.</p><p>Certa vez Marshall tinha perguntado, genuinamente curioso:<br>— Como é lá em cima?<br>Skye tentou explicar:<br>— Você sabe quando você entra numa piscina quentinha e tudo desaparece exceto a água?<br>— Sei.<br>— É parecido. Só que em vez de água é vento. E em vez de piscina é o mundo inteiro.<br>Marshall ficou quieto processando.<br>— Acho que quero tentar.<br>— Você vai adorar.<br>— Mas tenho medo de altura.<br>— Mais alto é melhor.<br>— Essa lógica não funciona pra mim, Skye.</p><p>Naquela noite Skye foi pra cama, deixou a janelinha aberta pro vento entrar, e se acomodou no travesseiro. A brisa passava de leve pelas orelhas. Não era o mesmo que voar. Mas era parente próximo.</p><p>E ela dormiu sorrindo. ✈️</p>"},
    {t:"Skye e as Nuvens que Conhecia pelo Nome",b:"<p>Skye voava tanto que tinha começado a reconhecer as nuvens como velhas conhecidas. Havia a nuvem gorda e branca que ficava sempre sobre o farol nas manhãs de quarta-feira. Havia o grupo de nuvenzinhas pequenas que anunciavam chuva quando apareciam no horizonte sul. E havia uma nuvem comprida e fina como uma pena que Skye tinha batizado de Peninha e que aparecia sempre que o tempo ia ficar excepcional.</p><p>Chase tinha ouvido ela falando sobre isso e questionado:<br>— Você dá nome pras nuvens?<br>— Algumas merecem nome.<br>— Elas são massas de vapor d'água condensado.<br>— Chase.<br>— O quê?<br>— Deixa eu ter isso.</p><p>Naquela noite Skye olhou pela janelinha antes de dormir e viu a Peninha passando devagarzinho pelo céu de estrelas, como uma pincelada branca em tinta azul escuro.</p><p>— Boa noite, Peninha — ela sussurrou.<br>A nuvem passou em silêncio. Skye fechou os olhinhos.<br>E foi sonhar com céus que só ela conhecia. ☁️</p>"},
    {t:"Skye e o Pinkzinho de Sempre",b:"<p>O Pinkzinho estava na coleção de Skye desde que ela era pequeninha — um passarinho de pelúcia cor-de-rosa com uma asinha que tinha um remendo de tecido diferente, resultado de um acidente com uma tesoura quando ela tinha uns dois anos. A pelúcia estava achatada de tanto abraço. Mas era o Pinkzinho. Era insubstituível.</p><p>Rocky tinha visto ela guardar o bichinho uma vez e comentado:<br>— Isso é muito antigo.<br>— É meu.<br>— A asa está remendada com tecido errado.<br>— É histórico.<br>— Você poderia comprar um novo idêntico.<br>— Rocky. Não é sobre o brinquedo. É sobre o que tem dentro dele.<br>Rocky ficou quieto. Depois disse:<br>— Entendi. Desculpa.<br>— Não precisa pedir desculpa. É só que... algumas coisas guardam memória. E memória não tem substituto.</p><p>Naquela noite Skye colocou o Pinkzinho no lugar de sempre, do lado do travesseiro. Se acomodou. O ventinho da janelinha mexia nas folhinhas da plantinha da janela.</p><p>A Skye corajosa que não tinha medo de tempestade nem de missão difícil dormia toda noite com um passarinho remendado do lado. E ficava tudo certo. 💕</p>"}
  ]},
  rocky: { nome:"Rocky", emoji:"♻️", l:[
    {t:"Como Rocky Virou o Engenheiro da Patrulha",b:"<p>Ryder encontrou Rocky num depósito de materiais recicláveis e ficou olhando por uns dez minutos sem se aproximar. O filhote estava trabalhando — separando material com uma concentração de adulto, testando cada objeto antes de decidir onde colocava, e quando encontrou uma mangueira com furo, passou dois minutos procurando especificamente um parafuso do tamanho certo pra tampar o buraco.</p><p>Ryder se aproximou devagar:<br>— Você tá... consertando ela?<br>Rocky virou. Olhou pro Ryder. Olhou pra mangueira. Voltou pro Ryder.<br>— Ela ainda funciona. Só tem um furo pequeno. Seria desperdício jogar fora.<br>— Você faz isso sozinho?<br>— Ninguém mais estava fazendo.<br>— Quanto tempo você fica aqui por dia?<br>— Quanto tiver coisa pra consertar.</p><p>Ryder ficou parado por um momento. E então disse a coisa que mudou tudo:<br>— Quer fazer isso com equipamento de verdade? Com um lugar pra trabalhar? Com uma equipe?<br>Rocky ficou imóvel por três segundos. Depois disse:<br>— Não jogar fora — reutilizar.<br>— É exatamente isso que eu estava pensando.</p><p>E assim Rocky entrou pra Patrulha. Com o lema, as ferramentas, e uma prateleira que logo seria a mais organizada de toda a Baía. ♻️</p>"},
    {t:"Rocky e as Ferramentas no Lugar Certo",b:"<p>Quinze minutos. Era quanto Rocky precisava toda noite pra guardar as ferramentas. Não era negociável. Não era opcional. Era o ritual.</p><p>Cada chave no gancho correspondente. Cada alicate no compartimento etiquetado. Os parafusos separados por tamanho nos potinhos transparentes numerados. O martelo no cabide reforçado, não no normal — Rocky tinha feito um estudo sobre tensão de material e o cabide normal não era adequado pro peso daquele martelo específico.</p><p>Rubble tinha entrado uma vez no meio do processo:<br>— Você tá organizando de novo?<br>— Reorganizando. Há diferença.<br>— Mas você organizou ontem.<br>— E ontem ficou 94% ótimo. Hoje chego em 100%.<br>— Como uma ferramenta sai de lugar se ficou no lugar?<br>Rocky virou pra ele com aquele olhar:<br>— Rubble. Sai do meu galpão.</p><p>Quando terminou, Rocky deu uma última olhada pra prateleira. Perfeita. Tudo no lugar exato. Tudo pronto pra amanhã. Havia uma paz específica naquilo que ele não conseguia explicar pra ninguém mas não precisava explicar.</p><p>Foi pra cama. Dormiu com a cabeça quieta de quem não deixou nenhum parafuso fora do lugar. 🔧</p>"},
    {t:"Rocky e a Ideia que Nao Espera",b:"<p>A cabeça de Rocky não tinha botão de desligar. Ryder tinha tentado explicar isso pra ele uma vez:<br>— Você precisa aprender a parar de pensar antes de dormir.<br>— Não consigo.<br>— Tenta contar ovelhas.<br>— Estou pensando em como otimizar o sistema de pastagem das ovelhas.<br>— Rocky...<br>— E nas possibilidades de energia eólica num terreno de colina inclinada.<br>— Isso não é o que eu quis dizer.</p><p>Rocky tinha aprendido então a usar isso a favor: o caderinho de ideias ficava sempre do lado da cama. Quando uma ideia aparecia, ele anotava. Rápido. Três linhas. Depois fechava o caderinho e podia dormir porque a ideia estava segura no papel e não precisava mais ficar circulando na cabeça.</p><p>Naquela noite, já quase dormindo, surgiu uma boa: e se a cobertura do quartel pudesse coletar água da chuva e filtrar pra reabastecer os veículos? Sustentável, econômico, eficiente.</p><p>Rocky abriu o caderinho. Três linhas. Fechou.<br>Os olhos foram pesando imediatamente.<br>E Rocky dormiu, a mente quieta, as ideias guardadas, pra amanhã. ♻️</p>"},
    {t:"Rocky e a Chuva do Lado de Fora",b:"<p>Todo mundo na Patrulha sabia: Rocky não gostava de se molhar. Era quase filosófico. Água era um recurso precioso pra ser usado com propósito, não pra cair em cima de quem não pediu.</p><p>Rocket — o Rocket dos Guardiões, que Rocky tinha ouvido falar uma vez — aparentemente também tinha esse problema com água. Rocky achava que se os dois se encontrassem, teriam muito a conversar.</p><p>O paradoxo era que o som da chuva, de dentro, seco, era uma das coisas mais relaxantes do universo pra Rocky. Ele sabia disso e achava completamente irracional. Mas funcionava.</p><p>Naquela noite a chuva começou enquanto ele já estava na caminha. <b>Tac tac tac.</b> No telhado. Regular e constante.<br>Rocky se aninhou no centro do colchão, longe das beiradas onde qualquer respingo poderia chegar por uma fresta, e se enrolou no cobertor até o nariz.<br>— Pode chover — ele murmurou pra chuva. — Mas lá fora.<br><b>Tac tac tac.</b><br>— Sim, assim.</p><p>E Rocky dormiu embalado pela chuva que ele amava desde que ficasse do lado correto da parede. 🌧️</p>"},
    {t:"Rocky e a Prateleira do Que Pode Virar Algo",b:"<p>A prateleira proibida de Rocky — proibida no sentido de que ele ficava desconfortável quando alguém mexia — estava cheia de coisas que outros teriam jogado fora. Um parafuso de titânio com rosca esquerda. Um circuito de uma calculadora velha. Um pedaço de vidro temperado com uma forma curiosa. Uma mola de aço de resistência específica.</p><p>— Isso é lixo — Rubble tinha dito uma vez, inocentemente.<br>Rocky havia virado devagarzinho:<br>— Lixo é uma coisa que não tem mais uso. Esse parafuso de titânio tem aplicações em estruturas de alto impacto. Esse circuito pode servir pra um sensor de temperatura. Esse vidro...<br>— Rocky.<br>— Sim?<br>— Quanto tempo você já pensou em uso pra esse vidro?<br>Pausa.<br>— Seis meses.<br>— Tá bom.</p><p>Naquela noite Rocky ficou parado na frente da prateleira. O pedaço de espelho captava o reflexo das estrelas da janelinha e as projetava na parede do lado. Estrelinhas dançando num pedaço de espelho de nada.</p><p>Rocky ficou olhando por uns três minutos. Depois foi pra cama, levando aquilo no pensamento: beleza aparece nos lugares mais inesperados quando você para de olhar só pro óbvio. E dormiu. ✨</p>"}
  ]},
  zuma: { nome:"Zuma", emoji:"🌊", l:[
    {t:"Como Zuma Virou o Socorrista Aquatico",b:"<p>Ryder encontrou Zuma no mar. Bem, não literalmente no mar — na beira, mas tão dentro quanto as pernas permitiam, que num labrador filhote de quatro meses eram praticamente dentro. Zuma estava na água até o pescoço num dia de ondas médias, nadando contra a corrente por puro prazer, absolutamente não cansado.</p><p>Ryder ficou uns vinte minutos observando antes de ir falar com ele. No décimo minuto, uma criança tinha caído de um caiaque a uns quinze metros. Antes de qualquer adulto ter processado o que aconteceu, Zuma já estava nadando. Chegou, deixou a criança se agarrar, voltou pro raso. Tudo em quarenta segundos.</p><p>— Você fez isso antes? — Ryder perguntou quando Zuma voltou pra beira.<br>— Quando precisa — Zuma respondeu, sacudindo a água das orelhas. <b>SPLASH!</b><br>— Com frequência?<br>— Depende das ondas e de quem tá no mar.<br>— Quer fazer isso oficialmente? Com equipamento e tudo?<br>Zuma olhou pro mar. Depois pro Ryder. Depois pro mar de novo.<br>— Pode ser legal.<br>Que era a maneira do Zuma dizer: <em>é o que eu sempre quis.</em></p><p>E naquela noite, o novo membro aquático da Patrulha dormiu com o barulhinho das ondas pela janelinha, pronto. 🌊</p>"},
    {t:"Zuma e as Ondas de Madrugada",b:"<p>Era um hábito que Zuma tinha há anos: antes de dormir, ia até a beira do mar. Não nadar. Não trabalhar. Só ficar.</p><p>Era uma distinção que levou um tempo pra ele explicar pro Ryder quando o Ryder perguntou o porquê:<br>— Você vai ao mar antes de dormir toda noite?<br>— Toda noite.<br>— Por segurança?<br>— Não. Por mim.<br>— Diferença?<br>— Quando vou por segurança, fico atento ao que pode estar errado. Quando vou por mim, só ouço.<br>Ryder ficou quieto um segundo.<br>— O que você ouve?<br>— O mar respirando.</p><p>Naquela noite Zuma ficou na beira mais tempo do que o habitual. O mar estava particularmente quieto — aquela quietude de water tão calma que parecia sólida. As ondas chegavam e voltavam num ritmo lento. <b>Swoosh... swoosh... swoosh...</b></p><p>Zuma fechou os olhos, ouviu, e sentiu o dia inteiro sair pelo barulhinho das ondas.</p><p>De volta à casinha laranja, deitou e o ritmo do mar continuou na memória. E Zuma dormiu embalado por aquilo, como sempre. 🌊</p>"},
    {t:"Zuma e o Peixe de Arco-Iris",b:"<p>Numa tarde de missão tranquila numa enseada, Zuma tinha parado o hovercraft e ficado em silêncio por um motivo muito específico: um peixe diferente de tudo que ele já tinha visto estava nadando em círculos lentos perto da superfície.</p><p>Era azul, verde e dourado ao mesmo tempo. Quando a luz do sol batia nas escamas, aparecia um quarto cor — algo entre laranja e roxo — que Zuma não conseguia nomear. O peixe não fugiu. Ficou nadando em círculos, olhando pro hovercraft, aparentemente curioso.</p><p>Zuma ficou parado uns oito minutos. Só olhando. O relatório de missão ia mencionar <em>parada para observação de fauna marinha</em> e Chase ia fazer uma cara, mas tudo bem.</p><p>O peixe depois de um tempo mergulhou pro fundo escuro e sumiu. Zuma olhou pra água ainda por mais um pouco. Depois ligou o motor.</p><p>De noite, deitado na caminha, ainda via as escamas arco-íris fechando os olhos. O mar escondia tantas coisas que ninguém tinha visto ainda.</p><p>— Boa noite, peixe de arco-íris — ele murmurou.<br>E foi sonhar com profundezas cheias de coisas que ninguém ainda tinha descoberto. 🐠</p>"},
    {t:"Zuma e a Espuma que Faz Rir",b:"<p>Havia um prazer específico que Zuma tinha descoberto quando criança e nunca perdeu: pular na espuma das ondas que quebravam na areia. Havia algo na combinação de água fria, areia molhada, e aquela espuma branca espessa que era impossível experimentar sem rir.</p><p>Naquela tarde, durante uma pausa entre missões, Zuma passou quarenta e cinco minutos fazendo exatamente isso enquanto Marshall o observava do banco.</p><p><b>SPLASH!</b> — pulo na onda.<br><b>PRRRSSS!</b> — a espuma se espalhando.<br>Zuma emergindo com a cara coberta de espuma branca e rindo.<br>— É isso aí? — Marshall perguntou.<br>— Vem tentar!<br>— Acho que não.<br>— Tá com medo?<br>— Não, é que...<br><b>SPLASH!</b><br>Marshall emergiu da onda seguinte completamente encharcado, espuma na orelha, com uma expressão de total surpresa. E então começou a rir também.</p><p>De noite, sequinho e quentinho na caminha, Zuma ainda sentia aquela leveza de quem gastou energia da forma mais idiota e gostosa possível. Fechou os olhos. Dormiu sorrindo. 💦</p>"},
    {t:"Zuma e os Cinco Melhores",b:"<p>Zuma era do tipo de cachorrinho que não deixava pensamento pesado ficar muito tempo. Tinha um sistema simples pra quando o dia estava difícil: pensava nos cinco melhores momentos do mês. Não os heroicos — os simples.</p><p>Naquela noite, antes de dormir, fez o exercício:<br>Um: a Skye tinha imitado o Capitão Turbot pra Patrulha inteira e todo mundo caiu na gargalhada.<br>Dois: o Rubble tinha feito uma construção de areia com as crianças que ficou de pé por dois dias inteiros.<br>Três: o Chase tinha chegado na missão com a sirene tocando <em>Happy Birthday</em> de surpresa porque era o aniversário da Sra. Betina e ninguém tinha pedido pra ele fazer isso.<br>Quatro: o Rocky tinha consertado o brinquedo quebrado da Cali sem ninguém pedir, só porque estava passando e viu que estava quebrado.<br>Cinco: o Marshall tinha tropeçado em nada, caído de forma espetacular, levantado rindo, e dito <em>TÔ BEM!</em> com tal entusiasmo que até o Chase tinha sorrido.</p><p>Zuma ficou um segundo pensando que era um time muito bom aquele.<br>Depois foi dormir, o coração levinho. 🧡</p>"}
  ]},
  rubble: { nome:"Rubble", emoji:"🏗️", l:[
    {t:"Como Rubble Entrou pra Patrulha",b:"<p>Rubble apareceu na porta do Ryder numa tarde de chuva com aquele olhar de bulldog inglês que mistura seriedade total com fofura absoluta. Sem coleira. Sem plaquinha. Sentado na chuva como se aquilo fosse completamente normal.</p><p>Ryder abriu a porta:<br>— Oi.<br>Rubble:<br>— Oi.<br>— Você tá perdido?<br>Rubble pensou por um segundo. Balançou a cabeça negativamente.<br>— Tá procurando alguém?<br>Rubble olhou pro Ryder. Depois olhou pro quartel. Depois voltou pro Ryder com aquela expressão que claramente dizia: <em>estava procurando você especificamente.</em></p><p>Ryder deixou ele entrar. Deu comida. Ficaram sentados enquanto a chuva batia lá fora.</p><p>No dia seguinte, observando o Rubble construir uma pilha de caixas com uma paciência e uma engenharia improváveis, Ryder entendeu: era o construtor que faltava. O que via estrutura onde outros viam caos. O que reconstruía o que ficava quebrado nas missões.</p><p>— Quer entrar pra equipe?<br>Rubble olhou pro equipamento de construção amarelo que Ryder tinha mostrado. Depois olhou pro Ryder com aquele sorriso enorme que tomava metade do rosto:<br>— Sempre quis construir coisas importantes.</p><p>E construiu. Desde aquele dia. 🏗️</p>"},
    {t:"Rubble e o Projeto do Dia",b:"<p>Rubble tinha construído naquele dia uma casinha nova para a Cali, o gato da prefeita, que tinha pedido uma casinha mais protegida do vento. Tinha ficado bonita — madeira lisa, telhado curvado que redirecionava a chuva pra longe, abertura posicionada longe da direção do vento dominante.</p><p>A Cali tinha entrado, andado em círculo duas vezes, saído, entrado de novo, e finalmente se instalado com aquele ar de aprovação felina que era praticamente um troféu.</p><p>A prefeita Goodway tinha ficado radiante:<br>— Rubble! Ela aprovou!<br>— Eu sei. Gatos são os melhores clientes: eles deixam bem claro quando gostam e quando não gostam.<br>— Você poderia ter cobrado.<br>— Eu não cobro de gatos.<br>A prefeita: — Que princípio estranho e adorável.</p><p>De noite, Rubble foi pra cama depois das duas voltinhas e meia obrigatórias no colchão — sempre duas e meia, nunca mais, nunca menos. Se aninhou no cantinho favorito.</p><p>Pensou na Cali na casinha nova. E num projeto assim, que fica de pé e serve alguém, havia uma satisfação que não tinha substituto.</p><p>Dormiu com isso quentinho no peito. 😴</p>"},
    {t:"Rubble e os Tesouros do Travesseiro",b:"<p>Rubble tinha o que Chase chamava educadamente de <em>hábito de acúmulo estratégico</em> e o Rocky chamava diretamente de <em>entulho embaixo do travesseiro.</em></p><p>Naquela noite embaixo do travesseiro havia: o ossinho de borracha amarelo em estágio de mastigação intermediária. Um biscoitinho de cachorro de frango-e-batata-doce guardado há quatro dias <em>pro caso de emergência.</em> E a pedrinha roxa do rio que mudava de cor dependendo da luz.</p><p>Chase tinha descoberto o sistema certa vez:<br>— Você guarda comida embaixo do travesseiro?<br>— Emergência alimentar.<br>— Rubble. Você tem um comedouro cheio a três metros daqui.<br>— E se eu acordar com fome no escuro?<br>— Você... acende a luz?<br>Rubble ficou quieto. Era uma solução válida. Mas não era a mesma coisa.</p><p>Ryder tinha dito uma vez: <em>cada um cuida do que importa do seu jeito.</em> E o jeito do Rubble envolvia pedrinhas roxas e biscoitinhos de emergência, e tudo bem.</p><p>Rubble colocou a cabeça no travesseiro, sentiu o relevo familiar dos tesouros embaixo, e fechou os olhos satisfeito. 🦴</p>"},
    {t:"Rubble e a Ronda do Carinho",b:"<p>Todo mundo na Patrulha tinha rituais noturnos diferentes. Chase fazia ronda. Rocky organizava ferramentas. Skye olhava pro céu. Zuma ia ao mar. Marshall tomava banho por tempo indeterminado.</p><p>E Rubble? Rubble fazia a ronda do carinho.</p><p>Toda noite, antes de dormir, ele passava em cada casinha. Não era verificação de segurança — era afeto de propósito, distribuído pessoalmente, um por um.</p><p>Chase recebia um abraço rápido no pescoço que ele sempre fingia não precisar e sempre correspondia. Marshall, um abraço enorme com animação correspondente. Skye, um toque de focinho carinhoso. Rocky, que fingia surpresa mas esperava pelo abraço. Zuma, que abanava o rabo sem qualquer pudor.</p><p>Todo mundo ficava um pouco mais feliz. Era simples assim. E havia uma magia específica naquilo que Rubble tinha descoberto: dar carinho de propósito, sem esperar nada de volta, sempre deixava quem dava com mais do que tinha antes de começar.</p><p>De volta na própria caminha, Rubble deitou com o coração transbordando. E dormiu abraçado por um afeto que nunca acabava porque sempre se renovava. 💛</p>"},
    {t:"Rubble e o Biscoito da Dona Clara",b:"<p>A Dona Clara morava na casa da esquina e tinha o hábito maravilhoso de assar biscoitos pra Patrulha quando a missão tinha sido especialmente difícil. Ela não avisava quando ia fazer — só aparecia no quartel com a vasilha coberta por um pano de prato floral e um sorriso que cabia na porta.</p><p>O biscoito de hoje era de mel e aveia. Pro Rubble ela sempre colocava um extra — ela mesma explicou a razão um dia:<br>— Você abana o rabo toda vez que me vê. Como eu não vou gostar de você?</p><p>Rubble comeu o dele devagarzinho, saboreando do jeito certo que biscoito de mel merece. O resto da equipe comeu com aquele silêncio específico de gente que está com fome e muito grata ao mesmo tempo.</p><p>Quando a Dona Clara foi embora, Ryder disse:<br>— Alguém devia agradecer mais.<br>Rubble:<br>— Eu abanei o rabo quando ela chegou E quando ela saiu.<br>Chase:<br>— Acho que isso cobre.</p><p>De noite, Rubble ainda sentia o gostinho de mel. E pensou na Dona Clara, que era gentil sem precisar de motivo. Dormiu com aquilo doce, como o biscoito. 🍯</p>"}
  ]},
  everest: { nome:"Everest", emoji:"❄️", l:[
    {t:"Como Everest Entrou pra Patrulha",b:"<p>A Patrulha tinha sido chamada pra uma missão nas montanhas nevadas. Uma trilha tinha ficado bloqueada por avalanche e um grupo de aventureiros precisava de resgate.</p><p>Eles chegaram e encontraram a neve, o frio, e — inesperadamente — uma husky cinza e branca que já estava lá. Que já sabia qual era o caminho seguro. Que já tinha localizado o grupo preso.</p><p>Chase ficou surpreso:<br>— Você já encontrou eles?<br>— Há vinte minutos — Everest respondeu com naturalidade.<br>— Você mora aqui?<br>— Com o Jake. Mas conheço cada trilha dessa montanha.<br>— Desde quando?<br>— Desde sempre.</p><p>A missão foi resolvida muito mais rápido com a ajuda de Everest. Quando a Patrulha foi embora, Ryder olhou pra ela e sentiu aquela coisa que sentia quando encontrava o membro certo: a sensação de que a equipe estava mais completa.</p><p>— Quer fazer parte da Patrulha?<br>Everest ficou em silêncio por um segundo. Olhou pras montanhas que amava. Depois olhou pra equipe.<br>— Posso continuar morando aqui?<br>— É onde você é mais necessária.<br>— Então sim.</p><p>E naquela noite, Everest dormiu como membro oficial da Patrulha Canina, com a neve brilhando lá fora e o coração cheio. ❄️</p>"},
    {t:"Everest e o Azul da Neve de Noite",b:"<p>Havia um segredo que Everest guardava sobre as montanhas: a neve de noite era completamente diferente da neve de dia. De dia era branca e brilhante, às vezes quase que refletia demais. À noite, sem o sol, a neve captava a luz da lua e ficava de um azul suave e profundo que transformava a montanha inteira numa paisagem de conto de fadas.</p><p>Everest ficava parada na porta da casinha toda noite antes de dormir, olhando pra isso. As árvores carregadas de neve pareciam esculpidas em cristal azulado. O silêncio era imenso e perfeito.</p><p>O Jake tinha saído uma vez e ficado do lado dela:<br>— O que você tá olhando?<br>— A neve.<br>— Todo dia você olha pra neve.<br>— Todo dia ela é levemente diferente.<br>Jake ficou em silêncio olhando também por um tempo.<br>— É mesmo — ele disse.<br>— É sempre — ela respondeu.</p><p>Depois Everest entrou, sacudiu a neve das patas, foi pra caminha quentinha. Lá fora, as montanhas continuavam sendo azuis na noite. E Everest dormiu embalada pela paisagem que amava. ❄️</p>"},
    {t:"Everest e o Silencio que Abraca",b:"<p>Havia um silêncio específico nas montanhas que Everest considerava o melhor do mundo. Não era vazio — era cheio. Cheio de coisas sutis que só apareciam quando o barulho maior parava: o barulhinho da neve assentando. O vento suave nos picos distantes. O próprio fôlego, nítido no frio.</p><p>Visitantes que subiam às montanhas às vezes ficavam desconfortáveis com esse silêncio. Procuravam preencher com conversa, com música, com qualquer coisa. Everest nunca entendeu isso.</p><p>— Como você suporta tanto silêncio? — um visitante tinha perguntado uma vez.<br>— Suportar? — Everest ficou genuinamente surpresa com a palavra.<br>— Não fica pesado?<br>— O silêncio não é pesado. É só... o mundo prestando atenção em si mesmo por um momento.</p><p>Naquela noite Everest foi pra caminha, fechou os olhos, e ficou escutando o silêncio da montanha. O pequeno barulhinho da neve. O vento longe. Sua própria respiração.</p><p>Era como ser abraçada pela montanha inteira. E ela dormiu dentro desse abraço. 🏔️</p>"},
    {t:"Everest e o Chocolate Quente do Jake",b:"<p>Jake tinha um talento especial para aparecer na hora certa. Aquela tarde tinha sido trabalhosa — uma missão que durou duas horas a mais do que o esperado, com uma tempestade de neve que ninguém tinha previsto, num terreno difícil. Everest tinha resolvido. Mas estava cansada de um jeito que ia além do físico.</p><p>Quando chegou na cabana do Jake pra dar boa noite, havia duas canecas fumegando na mesa. Jake não disse nada. Só empurrou uma na direção dela.</p><p>Era chocolate quente. Com canela. Do jeito que ela gostava — que Jake sabia de cor, sem precisar perguntar.</p><p>Ficaram sentados em silêncio por uns dez minutos, tomando chocolate com a neve caindo do lado de fora da janela. Não era necessário falar nada. Era o tipo de companhia que não precisa de palavras pra ser boa.</p><p>Quando a caneca ficou vazia, Everest estava diferente. Não cansada menos — mas com um quentinho por cima do cansaço que mudava tudo.<br>— Obrigada, Jake.<br>— Descansa.<br>— Tô indo.</p><p>E foi. E dormiu um dos melhores sonos da semana. 🍫</p>"},
    {t:"Everest e os Flocos que Ensinam Paciencia",b:"<p>Havia uma habilidade que Everest tinha desenvolvido ao longo dos anos de montanha que ela considerava das mais importantes: a paciência de esperar o floco certo.</p><p>Pegar neve na língua parecia simples. Mas pegar <em>um</em> floco específico — aquele que cai no ângulo certo, no ritmo certo, na trajetória certa — exigia ficar completamente imóvel, com a língua fora, olhando pro céu, esperando. Sem forçar. Sem tentar. Só esperar.</p><p>Muitos flocos passavam perto. Desviavam no último segundo. Iam pro nariz em vez da língua. Iam pro pelo da testa. Passavam do lado sem tocar em nada.</p><p>E então um pousava exatamente certo. E havia um gostinho de frio puro e limpo que não existia em mais nenhum lugar do mundo.</p><p>O Jake achava isso o hábito mais engraçado dela. Tinha filmado uma vez e ficado rindo por dois dias.<br>— Você esperou quatro minutos por um floco.<br>— Valeu cada segundo.<br>— Você é muito paciente.<br>— A montanha ensina.</p><p>Naquela noite Everest foi pra cama ainda com aquele gostinho de frio na memória. E dormiu sonhando com neve caindo devagarzinho num silêncio branco e perfeito. ☃️</p>"}
  ]}
};

  vingadores: { nome:"Vingadores", emoji:"⭐", l:[
    {
      t:"O Festival das Lanternas",
      b:"<p>Era uma vez o Homem de Ferro e o Homem-Aranha numa noite muito especial. A cidade inteira estava se preparando para o Festival das Luzes — um evento cheio de lanternas coloridas, música calma e balões brilhando no céu escuro.</p><p>Peter estava animadíssimo:<br>— Senhor Stark, dizem que dá pra ver as lanternas do outro lado da cidade!<br>Tony respondeu mexendo numa máquina:<br>— E este ano vai ser ainda melhor.<br>Peter olhou desconfiado:<br>— Quando o senhor fala isso... normalmente significa problema.<br>Tony sorriu:<br>— Dessa vez talvez só um probleminha pequeno.</p><p>Na praça principal, milhares de pessoas observavam as lanternas sendo preparadas. Tinha lanternas em forma de estrela, de lua, de peixinho, e até uma em formato de aranha que Peter fingiu não achar incrível. Mas bem na hora do festival começar... <b>BUUUP!</b> Todas as luzes apagaram. A música parou. As crianças fizeram: <em>Ooooh...</em></p><p>Tony olhou pro céu:<br>— O gerador principal falhou.<br>Peter já colocou a máscara:<br>— Então vamos salvar o festival.<br><b>SWISH! PSHHHT!</b> O Homem-Aranha saiu balançando entre os postes. O Homem de Ferro voava acima iluminando tudo com a armadura. As crianças apontavam: <em>Olha! O Homem de Ferro!</em></p><p>Peter encontrou os fios soltos, mas estavam altos demais. Tony teve uma ideia:<br>— Peter, sobe nas minhas costas.<br>— Isso nunca termina de forma normal, né?<br>Em segundos, Tony voava pelo céu enquanto Peter consertava os fios nas suas costas. <b>ZZZZT!</b> A praça inteira voltou a brilhar! Azuis. Amarelas. Vermelhas. Douradas. Milhares de lanternas subiram lentamente para o céu escuro como vagalumes gigantes.</p><p>Peter e Tony pousaram no alto de um prédio pra assistir. Peter falou baixinho:<br>— Acho que essa foi uma das noites mais bonitas da minha vida.<br>Tony respondeu:<br>— Algumas coisas ficam ainda melhores quando a gente compartilha.<br>Os dois ficaram em silêncio olhando as luzes dançando no céu. E agora é hora de descansar tranquilo, como uma lanterninha brilhando bem fraquinho antes de dormir. 😴</p>"

    {
      t:"A Noite que o Hulk Precisou de Ajuda",
      b:"<p>Era uma noite de chuva forte quando Bruce Banner bateu na porta da mansão dos Vingadores. Não como o Hulk — como o Bruce, de jaqueta molhada, óculos embaçados, com aquela expressão de quem não quer incomodar mas não tem pra onde ir.</p><p>Steve abriu a porta:<br>— Bruce? O que aconteceu?<br>— O laboratório alagou. Todos os equipamentos. Dois anos de pesquisa.<br>Silêncio.<br>— Posso ficar aqui hoje?<br>— Claro que pode. Entra.</p><p>Tony apareceu do fundo do corredor:<br>— Banner! Que bom timing. Preciso de ajuda num cálculo de—<br>Steve cortou com o olhar.<br>— Tony.<br>— O quê?<br>— Não agora.<br>Tony olhou pro Bruce. Leu a situação. Ficou quieto. O que pra Tony era um esforço considerável.</p><p>Natasha apareceu com uma toalha e uma xícara de chá quente, que ela colocou na mão do Bruce sem dizer nada. Esse era o jeito dela de dizer: <em>você está entre amigos.</em></p><p>Mais tarde, todos reunidos na sala grande, com a chuva batendo nas janelas, alguém sugeriu filmes. Escolheram uma comédia. Bruce riu pela primeira vez naquela noite — uma risada pequena, mas real.</p><p>Tony, que estava fingindo não estar prestando atenção em nada, disse baixinho pro Steve:<br>— Vai ficar bem.<br>— Eu sei.<br>— Eu também sei. Só quis falar.</p><p>Lá fora, a chuva continuou caindo. Lá dentro, os Vingadores ficaram acordados mais um pouco do que precisavam, só porque às vezes ficar junto é o suficiente. 💚</p>"
    },
    {
      t:"Thor e o Capitao America Ensinam Culinaria",

  document.getElementById("tab-marvel").className = "tab" + (tab === "marvel" ? " on" : "");
  document.getElementById("tab-paw").className = "tab" + (tab === "paw" ? " on" : "");
  document.getElementById("tab-ving").className = "tab" + (tab === "ving" ? " on-ving" : "");
  var card = document.getElementById("card");
  var hdiv = document.getElementById("hdiv");
  var btnNext = document.getElementById("btnNext");
  if (tab === "paw") {
    card.className = "card paw"; hdiv.className = "hdiv paw"; btnNext.className = "nbtn prx-paw";
  } else if (tab === "ving") {
    card.className = "card ving"; hdiv.className = "hdiv ving"; btnNext.className = "nbtn prx-ving";
  } else {
    card.className = "card"; hdiv.className = "hdiv"; btnNext.className = "nbtn prx";
  }
  buildHeroes();
  render();
}

function buildHeroes() {
  var hrow = document.getElementById("hrow");
  hrow.innerHTML = "";
  var data = getDataFor(currentTab);
  var keys = Object.keys(data);
  var isPaw = currentTab === "paw";
  var isVing = currentTab === "ving";
  for (var i = 0; i < keys.length; i++) {
    (function(h) {
      var btn = document.createElement("button");
      var activeClass = isPaw ? "hbtn on-paw" : isVing ? "hbtn on-ving" : "hbtn on";
      btn.className = h === ch ? activeClass : "hbtn";
      btn.id = "b-" + h;
      btn.innerHTML = "<span class='eml'>" + data[h].emoji + "</span>" + data[h].nome;
      btn.addEventListener("click", function() { setHero(h); });
      hrow.appendChild(btn);
    })(keys[i]);
  }
}

function setHero(h) {
  ch = h; ci = 0;
  var btns = document.querySelectorAll(".hbtn");
  var isPaw = currentTab === "paw";
  var isVing = currentTab === "ving";
  for (var i = 0; i < btns.length; i++) btns[i].className = "hbtn";
  var activeClass = isPaw ? "hbtn on-paw" : isVing ? "hbtn on-ving" : "hbtn on";
  document.getElementById("b-" + h).className = activeClass;
  render();
}

function nx() { var data = getDataFor(currentTab); var l = data[ch].l.length; ci = (ci + 1) % l; render(); }
function pv() { var data = getDataFor(currentTab); var l = data[ch].l.length; ci = (ci - 1 + l) % l; render(); }

function getKey() { return currentTab + "|" + ch + "|" + ci; }
function getHistory() { try { return JSON.parse(localStorage.getItem("lucca_hist") || "[]"); } catch(e) { return []; } }
function saveHistory(hist) { try { localStorage.setItem("lucca_hist", JSON.stringify(hist)); } catch(e) {} }

function markRead() {
  var data = getDataFor(currentTab);
  var o = data[ch]; var s = o.l[ci];
  var now = new Date();
  var dia = now.toLocaleDateString("pt-BR", {weekday:"long", day:"2-digit", month:"long", year:"numeric"});
  var hora = now.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});
  var entry = { key: getKey(), tab: currentTab, hero: o.nome, emoji: o.emoji, story: s.t, dia: dia, hora: hora, ts: now.getTime() };
  var hist = getHistory();
  hist.unshift(entry);
  if (hist.length > 200) hist = hist.slice(0, 200);
  saveHistory(hist);
  renderStamp(); renderHistList();
  var btn = document.getElementById("readBtn");
  btn.textContent = "✅ Lido! Li de novo?";
  btn.className = "read-btn done";
}

function renderStamp() {
  var hist = getHistory(); var key = getKey();
  var el = document.getElementById("readStamp"); var btn = document.getElementById("readBtn");
  var last = null;
  for (var i = 0; i < hist.length; i++) { if (hist[i].key === key) { last = hist[i]; break; } }
  if (last) {
    el.textContent = "✨ Ultima leitura: " + last.dia + " as " + last.hora;
    btn.textContent = "✅ Li de novo para o Lucca!"; btn.className = "read-btn done";
  } else {
    el.textContent = ""; btn.textContent = "📖 Li essa historia para o Lucca!"; btn.className = "read-btn";
  }
}

function renderHistList() {
  var hist = getHistory(); var el = document.getElementById("histList");
  if (!hist.length) { el.innerHTML = "<p class='hist-empty'>Nenhuma leitura registrada ainda.<br>Comece hoje! 🌙</p>"; return; }
  var html = "";
  for (var i = 0; i < hist.length; i++) {
    var h = hist[i];
    html += "<div class='hist-item'><div class='hist-hero'>" + h.emoji + " " + h.hero + "</div><div class='hist-story'>\"" + h.story + "\"</div><div class='hist-date'>📅 " + h.dia + " ⏰ " + h.hora + "</div></div>";
  }
  el.innerHTML = html;
}

function toggleHist() {
  var panel = document.getElementById("histPanel"); var btn = document.querySelector(".hist-toggle");
  if (panel.className === "hist-panel open") { panel.className = "hist-panel"; btn.textContent = "📚 Ver historico de leituras ▾"; }
  else { panel.className = "hist-panel open"; btn.textContent = "📚 Fechar historico ▴"; renderHistList(); }
}

function clearHist() {
  if (confirm("Apagar todo o historico de leituras?")) {
    try { localStorage.removeItem("lucca_hist"); } catch(e) {}
    renderHistList(); renderStamp();
  }
}

function render() {
  var data = getDataFor(currentTab);
  var o = data[ch], s = o.l[ci];
  var isPaw = currentTab === "paw";
  var isVing = currentTab === "ving";
  document.getElementById("se").textContent = o.emoji;
  var stEl = document.getElementById("st");
  stEl.textContent = s.t;
  stEl.className = isPaw ? "stitle paw" : isVing ? "stitle ving" : "stitle";
  var bodyHtml = s.b;
  if (isPaw) bodyHtml = bodyHtml.replace(/<b>/g,"<b class='paw'>").replace(/<b /g,"<b class='paw' ");
  if (isVing) bodyHtml = bodyHtml.replace(/<b>/g,"<b class='ving'>").replace(/<b /g,"<b class='ving' ");
  document.getElementById("sb").innerHTML = bodyHtml;
  document.getElementById("ct").textContent = "Historia " + (ci + 1) + " de " + o.l.length;
  renderStamp(); window.scrollTo(0, 0);
}

window.addEventListener("load", init);
</script>
</body>
</html>
