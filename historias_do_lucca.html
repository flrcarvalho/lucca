<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #0f0c29; color: #f0eeff; font-family: Arial, Helvetica, sans-serif; padding: 16px 16px 48px; min-height: 100vh; }
h1 { text-align: center; font-size: 26px; color: #f9c74f; margin: 16px 0 4px; }
.sub { text-align: center; font-size: 14px; color: #9b93cc; margin-bottom: 20px; }
.moon { display: block; text-align: center; font-size: 44px; margin-top: 12px; }

/* Hero scroll row */
.hrow { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.hrow::-webkit-scrollbar { display: none; }
.hbtn { flex: 0 0 auto; background: #1a1740; border: 2px solid #333066; border-radius: 14px; padding: 12px 16px; text-align: center; color: #f0eeff; font-size: 13px; font-weight: bold; font-family: Arial, sans-serif; cursor: pointer; min-width: 90px; }
.hbtn.on { border-color: #f9c74f; background: #221e50; color: #f9c74f; }
.eml { font-size: 26px; display: block; margin-bottom: 4px; }

/* Story card */
.card { background: #1a1740; border-radius: 20px; border: 1px solid #2a2560; padding: 22px 18px; }
.semoji { font-size: 40px; display: block; text-align: center; margin-bottom: 10px; }
.stitle { font-size: 19px; font-weight: bold; color: #f9c74f; text-align: center; margin-bottom: 14px; line-height: 1.3; }
.hdiv { border: none; height: 1px; background: #2a2560; margin-bottom: 16px; }
.stext { font-size: 16px; line-height: 1.9; color: #ddd8ff; }
.stext p { margin-bottom: 14px; }
.stext p:last-child { margin-bottom: 0; }
.stext b { color: #f9c74f; }

/* Nav buttons */
.brow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.nbtn { padding: 14px; border-radius: 12px; border: 2px solid #333066; background: #1a1740; color: #f0eeff; font-family: Arial, sans-serif; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; touch-action: manipulation; }
.nbtn.prx { background: #f9c74f; color: #1a1200; border-color: #f9c74f; }
.cnt { text-align: center; font-size: 12px; color: #9b93cc; margin-top: 12px; }
.gn { text-align: center; margin-top: 28px; font-size: 13px; color: #9b93cc; }
</style>
</head>

  </div>
  <p class="cnt" id="ct"></p>
</div>

var ch = "ferro";
var ci = 0;

function init() {
  var hrow = document.getElementById("hrow");
  var herois = Object.keys(D);
  for (var i = 0; i < herois.length; i++) {
    (function(h) {
      var btn = document.createElement("button");
      btn.className = "hbtn" + (h === "ferro" ? " on" : "");
      btn.id = "b-" + h;
      btn.innerHTML = "<span class='eml'>" + D[h].emoji + "</span>" + D[h].nome;
      btn.onclick = function() { setHero(h); };
      hrow.appendChild(btn);
    })(herois[i]);
  }

  document.getElementById("btnNext").onclick = function() { nx(); };
  document.getElementById("btnPrev").onclick = function() { pv(); };

  render();
}

function setHero(h) {
  ch = h; ci = 0;
  var btns = document.querySelectorAll(".hbtn");
  for (var i = 0; i < btns.length; i++) btns[i].className = "hbtn";
  document.getElementById("b-" + h).className = "hbtn on";
  render();
}

function nx() { var l = D[ch].l.length; ci = (ci + 1) % l; render(); }
function pv() { var l = D[ch].l.length; ci = (ci - 1 + l) % l; render(); }

function render() {
  var o = D[ch], s = o.l[ci];
  document.getElementById("se").textContent = o.emoji;
  document.getElementById("st").textContent = s.t;
  document.getElementById("sb").innerHTML = s.b;
  document.getElementById("ct").textContent = "Historia " + (ci + 1) + " de " + o.l.length;
  window.scrollTo(0, 0);
}

window.onload = init;
</script>

</html>
